rules:
  - id: google-genai-client-js
    pattern-either:
      - pattern: new GoogleGenerativeAI($...)
      - pattern: GoogleGenerativeAI($...)
    message: "Google Generative AI client detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-model-js
    pattern-either:
      - pattern: $CLIENT.getGenerativeModel($...)
      - pattern: getGenerativeModel($...)
    message: "Google Generative AI model access detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-generate-js
    pattern-either:
      - pattern: $MODEL.generateContent($...)
      - pattern: $MODEL.generateContentStream($...)
      - pattern: $MODEL.startChat($...)
    message: "Google Generative AI content generation detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-vertex-ai-js
    pattern-either:
      - pattern: new VertexAI($...)
      - pattern: VertexAI($...)
      - pattern: $VERTEX.preview.getGenerativeModel($...)
    message: "Google Vertex AI usage detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-model-config-js
    patterns:
      - pattern: |
          { ..., model: $MODEL, ... }
      - metavariable-regex:
          metavariable: $MODEL
          regex: "[\"'](gemini|palm|text-bison|chat-bison).*[\"']"
    message: "Google AI model configuration detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: google
      provider: google

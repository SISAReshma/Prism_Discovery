rules:
  - id: replicate-client-init-go
    pattern-either:
      - pattern: replicate.NewClient($...)
      - pattern: replicate.New($...)
    message: "Replicate client initialization detected"
    languages: [go]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-run-go
    pattern-either:
      - pattern: $CLIENT.Run($...)
      - pattern: $REP.Run($...)
    message: "Replicate model run detected"
    languages: [go]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-run-with-model-go
    patterns:
      - pattern-either:
          - pattern: $CLIENT.Run($CTX, "$MODEL", $...)
          - pattern: $REP.Run($CTX, "$MODEL", $...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: ".*[a-zA-Z0-9_\\-]+/[a-zA-Z0-9_\\-]+.*"
    message: "Replicate model detected: $MODEL"
    languages: [go]
    severity: WARNING
    metadata:
      category: replicate
      provider: replicate
      model_detection: true

  - id: replicate-predictions-go
    pattern-either:
      - pattern: $CLIENT.CreatePrediction($...)
      - pattern: $CLIENT.GetPrediction($...)
      - pattern: $CLIENT.ListPredictions($...)
      - pattern: $CLIENT.CancelPrediction($...)
    message: "Replicate predictions API usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-stream-go
    pattern-either:
      - pattern: $CLIENT.Stream($...)
      - pattern: $REP.Stream($...)
    message: "Replicate streaming detected"
    languages: [go]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-training-go
    pattern-either:
      - pattern: $CLIENT.CreateTraining($...)
      - pattern: $CLIENT.GetTraining($...)
      - pattern: $CLIENT.ListTrainings($...)
    message: "Replicate training API usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

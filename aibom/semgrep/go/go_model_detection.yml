rules:
  # ============================================================================
  # GO MODEL NAME DETECTION RULES
  # Captures model declarations in Go-specific patterns
  # ============================================================================

  # --------------------------------------------------------------------------
  # 1. Variable assignment: model := "gpt-4"  /  var model = "gpt-4"
  # --------------------------------------------------------------------------
  - id: go-model-variable-short-assign
    languages: [go]
    message: "Model name detected in variable assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: variable_assignment
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: $VAR := "$VALUE"
          - pattern: var $VAR = "$VALUE"
          - pattern: var $VAR string = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(model|models|modelName|modelID|modelId|model_name|model_id|engine|deployment|deploymentName)$'

  # --------------------------------------------------------------------------
  # 2. Const declaration: const model = "gpt-4"
  # --------------------------------------------------------------------------
  - id: go-model-const
    languages: [go]
    message: "Model name detected in const: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: const
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: const $VAR = "$VALUE"
          - pattern: const $VAR string = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(model|models|modelName|modelID|model_name|model_id|engine|deployment|defaultModel|DEFAULT_MODEL)$'

  # --------------------------------------------------------------------------
  # 3. Struct field with model value: Model: "gpt-4"
  # --------------------------------------------------------------------------
  - id: go-model-struct-field
    languages: [go]
    message: "Model name detected in struct field: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: struct_field
      confidence: "0.98"
    patterns:
      - pattern-either:
          - pattern: |
              $TYPE{..., Model: "$VALUE", ...}
          - pattern: |
              $TYPE{..., ModelName: "$VALUE", ...}
          - pattern: |
              $TYPE{..., ModelID: "$VALUE", ...}
          - pattern: |
              $TYPE{..., Engine: "$VALUE", ...}
          - pattern: |
              $TYPE{..., Deployment: "$VALUE", ...}

  # --------------------------------------------------------------------------
  # 4. Function call with model parameter: func(..., "gpt-4", ...)
  # --------------------------------------------------------------------------
  - id: go-model-function-arg
    languages: [go]
    message: "Model name detected in function argument: $MODEL"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: function_arg
      confidence: "0.90"
    patterns:
      - pattern-either:
          - pattern: $FUNC("$MODEL", $...)
          - pattern: $OBJ.$METHOD("$MODEL", $...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: '^(gpt-4|gpt-3\.5|gpt-4o|gpt-4-turbo|o1|o3|claude-3|claude-2|claude-3\.5|gemini|llama|mistral|phi-|qwen|deepseek|text-embedding|whisper|dall-e|stable-diffusion|command).*$'

  # --------------------------------------------------------------------------
  # 5. Map literal: map[string]string{"model": "gpt-4"}
  # --------------------------------------------------------------------------
  - id: go-model-map-literal
    languages: [go]
    message: "Model name detected in map: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: map_literal
      confidence: "0.90"
    patterns:
      - pattern-either:
          - pattern: |
              map[$K]$V{..., "model": "$VALUE", ...}
          - pattern: |
              map[$K]$V{..., "model_name": "$VALUE", ...}
          - pattern: |
              map[$K]$V{..., "model_id": "$VALUE", ...}

  # --------------------------------------------------------------------------
  # 6. Map key assignment: m["model"] = "gpt-4"
  # --------------------------------------------------------------------------
  - id: go-model-map-assign
    languages: [go]
    message: "Model name detected in map assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: map_assignment
      confidence: "0.92"
    patterns:
      - pattern-either:
          - pattern: $MAP["model"] = "$VALUE"
          - pattern: $MAP["model_name"] = "$VALUE"
          - pattern: $MAP["model_id"] = "$VALUE"
          - pattern: $MAP["engine"] = "$VALUE"

  # --------------------------------------------------------------------------
  # 7. Struct field assignment: req.Model = "gpt-4"
  # --------------------------------------------------------------------------
  - id: go-model-field-assign
    languages: [go]
    message: "Model name detected in field assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: field_assignment
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: $OBJ.Model = "$VALUE"
          - pattern: $OBJ.ModelName = "$VALUE"
          - pattern: $OBJ.ModelID = "$VALUE"
          - pattern: $OBJ.Engine = "$VALUE"
          - pattern: $OBJ.Deployment = "$VALUE"

  # --------------------------------------------------------------------------
  # 8. Environment variable access: os.Getenv("MODEL_NAME")
  # --------------------------------------------------------------------------
  - id: go-model-env-var
    languages: [go]
    message: "Model name environment variable detected: $VAR"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: env_var
      confidence: "0.85"
    patterns:
      - pattern-either:
          - pattern: os.Getenv("$VAR")
          - pattern: os.LookupEnv("$VAR")
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i).*(MODEL|ENGINE|DEPLOYMENT).*'

  # --------------------------------------------------------------------------
  # 9. AI SDK specific patterns (OpenAI Go, Anthropic Go, etc.)
  # --------------------------------------------------------------------------
  - id: go-model-ai-sdk-patterns
    languages: [go]
    message: "AI SDK model parameter detected: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: ai_sdk
      confidence: "0.99"
    patterns:
      - pattern-either:
          # OpenAI Go client
          - pattern: |
              openai.ChatCompletionRequest{..., Model: "$VALUE", ...}
          - pattern: |
              openai.CompletionRequest{..., Model: "$VALUE", ...}
          - pattern: |
              openai.EmbeddingRequest{..., Model: "$VALUE", ...}
          # Anthropic Go client
          - pattern: |
              anthropic.MessageRequest{..., Model: "$VALUE", ...}
          - pattern: |
              anthropic.MessageNewParams{..., Model: "$VALUE", ...}
          # Cohere Go client
          - pattern: |
              cohere.ChatRequest{..., Model: "$VALUE", ...}
          - pattern: |
              cohere.GenerateRequest{..., Model: "$VALUE", ...}

  # --------------------------------------------------------------------------
  # 10. Model constant references from AI SDK packages
  # --------------------------------------------------------------------------
  - id: go-model-sdk-constants
    languages: [go]
    message: "AI SDK model constant detected"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: sdk_constant
      confidence: "0.99"
    pattern-either:
      - pattern: openai.GPT4
      - pattern: openai.GPT4o
      - pattern: openai.GPT4oMini
      - pattern: openai.GPT4Turbo
      - pattern: openai.GPT3Dot5Turbo
      - pattern: openai.O1Preview
      - pattern: openai.O1Mini
      - pattern: anthropic.ModelClaude3Opus
      - pattern: anthropic.ModelClaude3Sonnet
      - pattern: anthropic.ModelClaude3Haiku
      - pattern: anthropic.ModelClaude35Sonnet

  # --------------------------------------------------------------------------
  # 11. Regex catch-all for model-like assignments (relaxed variable name)
  # --------------------------------------------------------------------------
  - id: go-model-regex-catch-all
    languages: [go]
    message: "Potential model name detected in assignment"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: regex_catchall
      confidence: "0.70"
    pattern-regex: '(?i)(?:model|engine|deployment)(?:Name|ID|_name|_id)?\s*(?::=|=)\s*"([^"]+)"'

  # --------------------------------------------------------------------------
  # 11b. Known AI model string literal — raw text search on .go files.
  #
  #      WHY pattern-regex instead of AST patterns:
  #      - Go AST `const $_ = "$VALUE"` does NOT match entries inside
  #        grouped `const (...)` blocks in many semgrep versions.
  #      - `metavariable-regex` silently fails when semgrep captures
  #        $VALUE with surrounding quotes ("gpt-4" instead of gpt-4),
  #        causing the regex `^(gpt-4|...)` to never match.
  #      - `languages: [generic]` rules are SKIPPED for .go files
  #        because semgrep already identifies them as Go language.
  #
  #      pattern-regex does plain text search on .go files regardless of
  #      AST structure — catches const blocks, struct fields, assignments,
  #      function args, anywhere a model string literal appears.
  # --------------------------------------------------------------------------
  - id: go-model-string-literal
    languages: [go]
    message: "AI model string literal detected in Go source"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: string_literal_regex
      confidence: "0.95"
    pattern-regex: '"(gpt-4[a-zA-Z0-9\-]*|gpt-3\.5[a-zA-Z0-9\-]*|o1-[a-zA-Z0-9\-]+|o3-[a-zA-Z0-9\-]+|dall-e[a-zA-Z0-9\-]*|text-embedding[a-zA-Z0-9\-]*|text-davinci[a-zA-Z0-9\-]*|text-curie[a-zA-Z0-9\-]*|text-babbage[a-zA-Z0-9\-]*|text-ada[a-zA-Z0-9\-]*|text-moderation[a-zA-Z0-9\-]*|whisper[a-zA-Z0-9\-]*|tts-[a-zA-Z0-9\-]+|claude-[a-zA-Z0-9\.\-]+|gemini-[a-zA-Z0-9\.\-]+|llama[a-zA-Z0-9\.\-]*|mistral[a-zA-Z0-9\.\-]*|phi-[a-zA-Z0-9\.\-]+|qwen[a-zA-Z0-9\.\-]*|deepseek[a-zA-Z0-9\.\-]*|stable-diffusion[a-zA-Z0-9\.\-]*|command-r[a-zA-Z0-9\-]*|ada-[a-zA-Z0-9\-]+|babbage-[a-zA-Z0-9\-]+|davinci-[a-zA-Z0-9\-]+|curie-[a-zA-Z0-9\-]+)"'

  # --------------------------------------------------------------------------
  # 11c. OpenAI / Anthropic / Google AI REST API URL detection.
  #      Uses pattern-regex on .go files (same reason as 11b above).
  # --------------------------------------------------------------------------
  - id: go-model-api-url
    languages: [go]
    message: "AI provider REST API URL detected — raw REST API usage"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: api_url
      confidence: "0.95"
    pattern-regex: '"https://(api\.openai\.com|api\.anthropic\.com|generativelanguage\.googleapis\.com)/v[0-9]+/'

  # --------------------------------------------------------------------------
  # 12. Google Generative AI model instantiation
  # --------------------------------------------------------------------------
  - id: go-model-google-genai
    languages: [go]
    message: "Google AI model instantiation detected: $MODEL"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: google_genai
      confidence: "0.98"
    patterns:
      - pattern: $CLIENT.GenerativeModel("$MODEL")
      - metavariable-regex:
          metavariable: $MODEL
          regex: "^(gemini|palm|text-bison|chat-bison|code-bison).*$"

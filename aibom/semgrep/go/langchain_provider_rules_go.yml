rules:
  - id: langchain-chat-model-go
    pattern-either:
      - pattern: llms.NewOpenAI($...)
      - pattern: llms.NewAnthropic($...)
      - pattern: openaillm.New($...)
      - pattern: anthropicllm.New($...)
      - pattern: googleai.New($...)
      - pattern: ollama.New($...)
    message: "LangChain Go LLM instantiation detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-generate-go
    pattern-either:
      - pattern: $LLM.GenerateContent($...)
      - pattern: $LLM.Call($...)
      - pattern: $LLM.Chat($...)
      - pattern: llms.GenerateFromSinglePrompt($...)
    message: "LangChain Go LLM call detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-chain-go
    pattern-either:
      - pattern: chains.NewLLMChain($...)
      - pattern: chains.NewConversationChain($...)
      - pattern: chains.NewRetrievalQA($...)
      - pattern: chains.NewStuffDocuments($...)
      - pattern: chains.NewMapReduceDocuments($...)
      - pattern: chains.Run($...)
      - pattern: chains.Call($...)
    message: "LangChain Go chain usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-agent-go
    pattern-either:
      - pattern: agents.NewExecutor($...)
      - pattern: agents.NewOpenAIFunctionsAgent($...)
      - pattern: agents.Initialize($...)
    message: "LangChain Go agent usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-embeddings-go
    pattern-either:
      - pattern: embeddings.NewOpenAI($...)
      - pattern: embeddings.NewEmbedder($...)
      - pattern: $EMBEDDER.EmbedDocuments($...)
      - pattern: $EMBEDDER.EmbedQuery($...)
    message: "LangChain Go embeddings detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-vectorstore-go
    pattern-either:
      - pattern: vectorstores.NewPinecone($...)
      - pattern: vectorstores.NewChroma($...)
      - pattern: vectorstores.NewWeaviate($...)
      - pattern: pinecone.New($...)
      - pattern: chromago.New($...)
      - pattern: weaviate.New($...)
      - pattern: $VS.SimilaritySearch($...)
      - pattern: $VS.AddDocuments($...)
    message: "LangChain Go vectorstore usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-memory-go
    pattern-either:
      - pattern: memory.NewBuffer($...)
      - pattern: memory.NewConversationBuffer($...)
      - pattern: memory.NewConversationSummary($...)
    message: "LangChain Go memory usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-document-loader-go
    pattern-either:
      - pattern: documentloaders.NewText($...)
      - pattern: documentloaders.NewPDF($...)
      - pattern: documentloaders.NewCSV($...)
      - pattern: documentloaders.NewHTML($...)
      - pattern: textsplitter.NewRecursiveCharacter($...)
    message: "LangChain Go document loader detected"
    languages: [go]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

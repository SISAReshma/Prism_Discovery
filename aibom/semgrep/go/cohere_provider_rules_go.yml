rules:
  - id: cohere-client-init-go
    pattern-either:
      - pattern: cohereclient.NewClient($...)
      - pattern: cohere.NewClient($...)
      - pattern: cohere.New($...)
    message: "Cohere client initialization detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-generate-go
    pattern-either:
      - pattern: $CLIENT.Generate($...)
      - pattern: $CLIENT.Chat($...)
      - pattern: $CLIENT.ChatStream($...)
    message: "Cohere text generation detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-embed-go
    pattern-either:
      - pattern: $CLIENT.Embed($...)
      - pattern: $CLIENT.EmbedJobs($...)
    message: "Cohere embedding detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-classify-go
    pattern-either:
      - pattern: $CLIENT.Classify($...)
    message: "Cohere classification detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-rerank-go
    pattern-either:
      - pattern: $CLIENT.Rerank($...)
      - pattern: $CLIENT.RerankV2($...)
    message: "Cohere rerank detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-summarize-go
    pattern-either:
      - pattern: $CLIENT.Summarize($...)
    message: "Cohere summarization detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-request-go
    pattern-either:
      - pattern: |
          cohere.ChatRequest{...}
      - pattern: |
          cohere.GenerateRequest{...}
      - pattern: |
          cohere.EmbedRequest{...}
      - pattern: |
          cohere.RerankRequest{..., Model: $MODEL, ...}
    message: "Cohere request struct detected"
    languages: [go]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

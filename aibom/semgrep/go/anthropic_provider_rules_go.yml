rules:
  - id: anthropic-client-init-go
    pattern-either:
      - pattern: anthropic.NewClient($...)
      - pattern: anthropic.New($...)
      - pattern: anthropic.NewClientWithConfig($...)
    message: "Anthropic client initialization detected"
    languages: [go]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-messages-go
    pattern-either:
      - pattern: $CLIENT.CreateMessage($...)
      - pattern: $CLIENT.CreateMessageStream($...)
      - pattern: $CLIENT.Messages.New($...)
      - pattern: $CLIENT.Messages.NewStreaming($...)
    message: "Anthropic messages API call detected"
    languages: [go]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-message-request-go
    pattern-either:
      - pattern: |
          anthropic.MessageRequest{..., Model: $MODEL, ...}
      - pattern: |
          anthropic.MessageNewParams{..., Model: $MODEL, ...}
    message: "Anthropic message request with model detected"
    languages: [go]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-model-constants-go
    pattern-either:
      - pattern: anthropic.ModelClaude3Opus
      - pattern: anthropic.ModelClaude3Sonnet
      - pattern: anthropic.ModelClaude3Haiku
      - pattern: anthropic.ModelClaude35Sonnet
      - pattern: anthropic.ModelClaude35Haiku
      - pattern: anthropic.ModelClaude2
    message: "Anthropic Claude model constant detected"
    languages: [go]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-bedrock-go
    pattern-either:
      - pattern: bedrock.NewClient($...)
      - pattern: anthropicbedrock.NewClient($...)
    message: "Anthropic Bedrock client detected"
    languages: [go]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

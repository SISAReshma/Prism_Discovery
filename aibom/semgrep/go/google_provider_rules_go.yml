rules:
  - id: google-genai-client-go
    pattern-either:
      - pattern: genai.NewClient($...)
      - pattern: $CLIENT.GenerativeModel($...)
    message: "Google Generative AI client detected"
    languages: [go]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-generate-go
    pattern-either:
      - pattern: $MODEL.GenerateContent($...)
      - pattern: $MODEL.GenerateContentStream($...)
      - pattern: $MODEL.StartChat($...)
      - pattern: $CS.SendMessage($...)
      - pattern: $CS.SendMessageStream($...)
    message: "Google Generative AI content generation detected"
    languages: [go]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-vertex-ai-go
    pattern-either:
      - pattern: aiplatform.NewPredictionClient($...)
      - pattern: aiplatform.NewEndpointClient($...)
      - pattern: aiplatform.NewModelClient($...)
      - pattern: $CLIENT.Predict($...)
    message: "Google Vertex AI usage detected"
    languages: [go]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-config-go
    pattern-either:
      - pattern: |
          genai.GenerationConfig{..., Temperature: $TEMP, ...}
      - pattern: |
          &genai.GenerationConfig{...}
    message: "Google Generative AI configuration detected"
    languages: [go]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-model-name-go
    patterns:
      - pattern: $CLIENT.GenerativeModel("$MODEL")
      - metavariable-regex:
          metavariable: $MODEL
          regex: "^(gemini|palm|text-bison|chat-bison|code-bison).*$"
    message: "Google AI model instantiation detected: $MODEL"
    languages: [go]
    severity: INFO
    metadata:
      category: google
      provider: google

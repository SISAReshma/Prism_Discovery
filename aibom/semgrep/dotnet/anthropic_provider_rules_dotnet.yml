rules:
  # Anthropic .NET SDK: https://github.com/anthropics/anthropic-sdk-dotnet

  - id: anthropic-client-init-dotnet
    pattern-either:
      - pattern: new AnthropicClient($...)
      - pattern: new AnthropicApiClient($...)
      - pattern: AnthropicClient.Create($...)
    message: "Anthropic client initialization detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-messages-dotnet
    pattern-either:
      - pattern: $CLIENT.CreateMessage($...)
      - pattern: $CLIENT.CreateMessageAsync($...)
      - pattern: $CLIENT.CreateMessageStream($...)
      - pattern: $CLIENT.CreateMessageStreamAsync($...)
      - pattern: $CLIENT.Messages.CreateAsync($...)
      - pattern: $CLIENT.Messages.CreateStreamAsync($...)
    message: "Anthropic messages API call detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-message-request-dotnet
    pattern-either:
      - pattern: |
          new MessageRequest { ..., Model = "$MODEL", ... }
      - pattern: |
          new CreateMessageRequest { ..., Model = "$MODEL", ... }
      - pattern: |
          new MessageCreateParams { ..., Model = "$MODEL", ... }
    message: "Anthropic message request with model detected: $MODEL"
    languages: [csharp]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-content-block-dotnet
    pattern-either:
      - pattern: new TextContent($...)
      - pattern: new ImageContent($...)
      - pattern: ContentBlock.CreateText($...)
      - pattern: ContentBlock.CreateImage($...)
    message: "Anthropic content block construction detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-bedrock-dotnet
    pattern-either:
      - pattern: new AnthropicBedrockClient($...)
      - pattern: AnthropicBedrockClient.Create($...)
      - pattern: new AmazonBedrockRuntime($...)
    message: "Anthropic Bedrock client detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

  - id: anthropic-model-constants-dotnet
    pattern-either:
      - pattern: AnthropicModels.Claude3Opus
      - pattern: AnthropicModels.Claude3Sonnet
      - pattern: AnthropicModels.Claude3Haiku
      - pattern: AnthropicModels.Claude35Sonnet
      - pattern: AnthropicModels.Claude35Haiku
    message: "Anthropic Claude model constant detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: anthropic
      provider: anthropic

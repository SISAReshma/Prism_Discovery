rules:
  # Cohere .NET: CohereV2, Cohere NuGet packages

  - id: cohere-client-init-dotnet
    pattern-either:
      - pattern: new CohereClient($...)
      - pattern: new CohereApiClient($...)
      - pattern: new CohereApi($...)
    message: "Cohere client initialization detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-generate-dotnet
    pattern-either:
      - pattern: $CLIENT.GenerateAsync($...)
      - pattern: $CLIENT.Generate($...)
      - pattern: $CLIENT.ChatAsync($...)
      - pattern: $CLIENT.Chat($...)
      - pattern: $CLIENT.ChatStreamAsync($...)
    message: "Cohere text generation detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-embed-dotnet
    pattern-either:
      - pattern: $CLIENT.EmbedAsync($...)
      - pattern: $CLIENT.Embed($...)
    message: "Cohere embedding detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-classify-dotnet
    pattern-either:
      - pattern: $CLIENT.ClassifyAsync($...)
      - pattern: $CLIENT.Classify($...)
    message: "Cohere classification detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-rerank-dotnet
    pattern-either:
      - pattern: $CLIENT.RerankAsync($...)
      - pattern: $CLIENT.Rerank($...)
    message: "Cohere rerank detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-summarize-dotnet
    pattern-either:
      - pattern: $CLIENT.SummarizeAsync($...)
      - pattern: $CLIENT.Summarize($...)
    message: "Cohere summarization detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-request-dotnet
    pattern-either:
      - pattern: |
          new ChatRequest { ... }
      - pattern: |
          new GenerateRequest { ... }
      - pattern: |
          new EmbedRequest { ... }
      - pattern: |
          new RerankRequest { ..., Model = "$MODEL", ... }
    message: "Cohere request object detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

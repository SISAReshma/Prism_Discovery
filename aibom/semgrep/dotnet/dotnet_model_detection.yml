rules:
  # ============================================================================
  # .NET (C#) MODEL NAME DETECTION RULES
  # Captures model declarations in C#-specific patterns
  # ============================================================================

  # --------------------------------------------------------------------------
  # 1. Variable assignment: var model = "gpt-4"; / string model = "gpt-4";
  # --------------------------------------------------------------------------
  - id: dotnet-model-variable-assign
    languages: [csharp]
    message: "Model name detected in variable assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: variable_assignment
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: $TYPE $VAR = "$VALUE";
          - pattern: var $VAR = "$VALUE";
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(model|models|modelName|modelID|modelId|model_name|model_id|engine|deployment|deploymentName)$'
    tags: [dotnet, model, variable]

  # --------------------------------------------------------------------------
  # 2. Const / readonly declaration: const string Model = "gpt-4";
  # --------------------------------------------------------------------------
  - id: dotnet-model-const
    languages: [csharp]
    message: "Model name detected in const: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: const
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: const $TYPE $VAR = "$VALUE";
          - pattern: static readonly $TYPE $VAR = "$VALUE";
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(Model|Models|ModelName|ModelID|ModelId|Model_Name|Model_Id|Engine|Deployment|DefaultModel|DEFAULT_MODEL)$'
    tags: [dotnet, model, const]

  # --------------------------------------------------------------------------
  # 3. Object initializer: new Options { Model = "gpt-4" }
  # --------------------------------------------------------------------------
  - id: dotnet-model-object-initializer
    languages: [csharp]
    message: "Model name detected in object initializer: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: object_initializer
      confidence: "0.98"
    patterns:
      - pattern-either:
          - pattern: |
              new $TYPE { ..., Model = "$VALUE", ... }
          - pattern: |
              new $TYPE { ..., ModelName = "$VALUE", ... }
          - pattern: |
              new $TYPE { ..., ModelId = "$VALUE", ... }
          - pattern: |
              new $TYPE { ..., DeploymentName = "$VALUE", ... }
          - pattern: |
              new $TYPE { ..., Engine = "$VALUE", ... }
    tags: [dotnet, model, initializer]

  # --------------------------------------------------------------------------
  # 4. Property assignment: options.Model = "gpt-4";
  # --------------------------------------------------------------------------
  - id: dotnet-model-property-assign
    languages: [csharp]
    message: "Model name detected in property assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: property_assignment
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: $OBJ.Model = "$VALUE";
          - pattern: $OBJ.ModelName = "$VALUE";
          - pattern: $OBJ.ModelId = "$VALUE";
          - pattern: $OBJ.DeploymentName = "$VALUE";
          - pattern: $OBJ.Engine = "$VALUE";
    tags: [dotnet, model, property]

  # --------------------------------------------------------------------------
  # 5. Method argument with model name string
  # --------------------------------------------------------------------------
  - id: dotnet-model-method-arg
    languages: [csharp]
    message: "Model name detected in method argument"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: method_arg
      confidence: "0.90"
    pattern-regex: '\w+\.\w+\(\s*"(gpt-5[^"]*|gpt-4o-mini|gpt-4o|gpt-4-turbo|gpt-4|gpt-3\.5-turbo|o1-preview|o1-mini|o3-mini|o4-mini|o1|o3|o4|claude-3[^"]*|claude-2[^"]*|gemini[^"]*|llama[^"]*|mistral[^"]*|phi-[^"]*|qwen[^"]*|deepseek[^"]*|text-embedding[^"]*|text-davinci[^"]*|text-curie[^"]*|text-babbage[^"]*|text-ada[^"]*|whisper[^"]*|dall-e[^"]*|command[^"]*)[^"]*"'
    tags: [dotnet, model, method]

  # --------------------------------------------------------------------------
  # 5b. OpenAI API URL with embedded model name
  #     e.g. "https://api.openai.com/v1/engines/text-davinci-003/completions"
  #     or   "https://api.openai.com/v1/models/gpt-4"
  # --------------------------------------------------------------------------
  - id: dotnet-model-openai-url
    languages: [csharp]
    message: "OpenAI API URL with model name detected"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: api_url
      confidence: "0.98"
    pattern-regex: 'api\.openai\.com/v1/(?:engines|models)/([a-zA-Z0-9._-]+)'
    tags: [dotnet, model, url, openai]

  # --------------------------------------------------------------------------
  # 5c. Generic AI provider API URL detection
  #     Catches: api.anthropic.com, generativelanguage.googleapis.com, etc.
  # --------------------------------------------------------------------------
  - id: dotnet-model-ai-api-url
    languages: [csharp]
    message: "AI provider API URL detected"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: api_url
      confidence: "0.90"
    pattern-regex: '"https?://(?:api\.openai\.com|api\.anthropic\.com|generativelanguage\.googleapis\.com|api\.cohere\.ai|api\.replicate\.com|api-inference\.huggingface\.co)[^"]*"'
    tags: [dotnet, model, url, api]

  # --------------------------------------------------------------------------
  # 6. Dictionary literal: { "model", "gpt-4" } or ["model"] = "gpt-4"
  # --------------------------------------------------------------------------
  - id: dotnet-model-dictionary
    languages: [csharp]
    message: "Model name detected in dictionary: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: dictionary
      confidence: "0.90"
    patterns:
      - pattern-either:
          - pattern: $DICT["model"] = "$VALUE";
          - pattern: $DICT["model_name"] = "$VALUE";
          - pattern: $DICT["model_id"] = "$VALUE";
          - pattern: $DICT["engine"] = "$VALUE";
    tags: [dotnet, model, dictionary]

  # --------------------------------------------------------------------------
  # 7. Environment variable access
  # --------------------------------------------------------------------------
  - id: dotnet-model-env-var
    languages: [csharp]
    message: "Model name environment variable detected: $VAR"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: env_var
      confidence: "0.85"
    patterns:
      - pattern: Environment.GetEnvironmentVariable("$VAR")
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i).*(MODEL|ENGINE|DEPLOYMENT).*'
    tags: [dotnet, model, env]

  # --------------------------------------------------------------------------
  # 8. Configuration access: config["Model"] or config.GetValue<string>("Model")
  # --------------------------------------------------------------------------
  - id: dotnet-model-config
    languages: [csharp]
    message: "Model configuration access detected: $KEY"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: config
      confidence: "0.85"
    patterns:
      - pattern-either:
          - pattern: $CONFIG["$KEY"]
          - pattern: $CONFIG.GetValue<$T>("$KEY")
          - pattern: $CONFIG.GetSection("$KEY")
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i).*(Model|Engine|Deployment).*'
    tags: [dotnet, model, config]

  # --------------------------------------------------------------------------
  # 9. AI SDK specific patterns (Azure OpenAI, Semantic Kernel, ML.NET)
  # --------------------------------------------------------------------------
  - id: dotnet-model-ai-sdk-patterns
    languages: [csharp]
    message: "AI SDK model parameter detected"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: ai_sdk
      confidence: "0.99"
    pattern-regex: '(?:new\s+ChatCompletionsOptions\s*\(\s*"([^"]+)"|DeploymentName\s*=\s*"([^"]+)"|AddAzureOpenAIChatCompletion\s*\(\s*"([^"]+)"|AddOpenAIChatCompletion\s*\(\s*"([^"]+)"|Model\.Load\s*\(\s*"([^"]+)")'
    tags: [dotnet, model, ai_sdk]

  # --------------------------------------------------------------------------
  # 10. Regex catch-all for model-like assignments
  # --------------------------------------------------------------------------
  - id: dotnet-model-regex-catch-all
    languages: [csharp]
    message: "Potential model name detected in assignment"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: regex_catchall
      confidence: "0.70"
    pattern-regex: '(?i)(?:model|engine|deployment)(?:Name|ID|_name|_id)?\s*[:=]\s*"([^"]+)"'
    tags: [dotnet, model, regex]
  # --------------------------------------------------------------------------
  # 11. Auto-property initializer: public string Model { get; set; } = "gpt-4o";
  #     Common in .NET settings/options classes (e.g. GptRequest.cs)
  # --------------------------------------------------------------------------
  - id: dotnet-model-auto-property
    languages: [csharp]
    message: "Model name detected in auto-property initializer"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: auto_property
      confidence: "0.95"
    pattern-regex: '(?i)(?:Model|ModelName|ModelId|Engine|Deployment|DeploymentName|DefaultModel)\s*\{\s*get;\s*set;\s*\}\s*=\s*"([^"]+)"'
    tags: [dotnet, model, property]

  # --------------------------------------------------------------------------
  # 12. Known AI model string literal used as first arg in constructor / tuple
  #     new ModelInfo("gpt-4o", "alias") / new("o1-preview", "o1") etc.
  # --------------------------------------------------------------------------
  - id: dotnet-model-known-string-ctor
    languages: [csharp]
    message: "Known AI model name string detected as constructor argument"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: known_model_ctor
      confidence: "0.97"
    pattern-regex: 'new\s*(?:\w+)?\s*\(\s*"(gpt-5[^"]*|gpt-4o-mini|gpt-4o|gpt-4-turbo|gpt-4|gpt-3\.5-turbo|o1-preview|o1-mini|o3-mini|o4-mini|o1|o3|o4|dall-e-3|dall-e-2|text-embedding-3-large|text-embedding-3-small|text-embedding-ada-002|text-davinci-[^"]*|text-curie-[^"]*|text-babbage-[^"]*|text-ada-[^"]*|whisper-1|tts-1-hd|tts-1|claude-3-5-sonnet|claude-3-opus|claude-3-sonnet|claude-3-haiku|claude-2|gemini-1\.5-pro|gemini-1\.5-flash|gemini-2[^"]*|gemini-pro|llama-3[^"]*|mistral-large|mistral-medium|command-r-plus|command-r)[^"]*"'
    tags: [dotnet, model, constructor]

  # --------------------------------------------------------------------------
  # 13. Pattern-regex fallback for target-typed new and any known model literal
  #     Catches: new("o1-preview", ...) / new("gpt-4o") / "dall-e-3" as literal
  #     Model name extracted from code snippet by model_extractor._CODE_PATTERNS
  # --------------------------------------------------------------------------
  - id: dotnet-model-known-literal-regex
    languages: [csharp]
    message: "Known AI model string literal detected"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: literal_regex
      confidence: "0.85"
    pattern-regex: '"(gpt-5[^"]*|gpt-4o-mini|gpt-4o|gpt-4-turbo|gpt-4|gpt-3\.5-turbo|o1-preview|o1-mini|o3-mini|o4-mini|o1|o3|o4|dall-e-3|dall-e-2|text-embedding-3-large|text-embedding-3-small|text-embedding-ada-002|text-davinci-[^"]*|text-curie-[^"]*|text-babbage-[^"]*|text-ada-[^"]*|whisper-1|tts-1-hd|tts-1|claude-3-5-sonnet|claude-3-opus|claude-3-sonnet|claude-3-haiku|claude-2|gemini-1\.5-pro|gemini-1\.5-flash|gemini-2[^"]*|gemini-pro|llama-3[^"]*|mistral-large|mistral-medium|command-r-plus|command-r)"'
    tags: [dotnet, model, literal]
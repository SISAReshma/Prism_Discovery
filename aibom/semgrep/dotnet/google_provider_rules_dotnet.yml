rules:
  # Google AI .NET: Google.Cloud.AIPlatform, Google.Apis.Generative

  - id: google-genai-client-dotnet
    pattern-either:
      - pattern: new GenerativeModel($...)
      - pattern: new PredictionServiceClient($...)
      - pattern: new PredictionServiceClientBuilder($...)
      - pattern: new EndpointServiceClient($...)
      - pattern: new ModelServiceClient($...)
    message: "Google Generative AI client detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-generate-dotnet
    pattern-either:
      - pattern: $MODEL.GenerateContentAsync($...)
      - pattern: $MODEL.GenerateContent($...)
      - pattern: $MODEL.GenerateContentStreamAsync($...)
      - pattern: $MODEL.StartChat($...)
      - pattern: $CHAT.SendMessageAsync($...)
      - pattern: $CHAT.SendMessageStreamAsync($...)
    message: "Google Generative AI content generation detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-vertex-ai-dotnet
    pattern-either:
      - pattern: $CLIENT.PredictAsync($...)
      - pattern: $CLIENT.Predict($...)
      - pattern: $CLIENT.DeployModel($...)
      - pattern: $CLIENT.DeployModelAsync($...)
      - pattern: new PredictRequest { ... }
    message: "Google Vertex AI usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-config-dotnet
    pattern-either:
      - pattern: |
          new GenerationConfig { ..., Temperature = $TEMP, ... }
      - pattern: |
          new GenerationConfig { ... }
    message: "Google Generative AI configuration detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-model-name-dotnet
    pattern-regex: 'new\s+GenerativeModel\s*\(\s*(?:[^,]+,\s*)?\"((gemini|palm|text-bison|chat-bison|code-bison)[^"]*)\"'
    message: "Google AI model instantiation detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-gemini-dotnet
    pattern-either:
      - pattern: GeminiModel($...)
      - pattern: $BUILDER.AddGoogleAIGeminiChatCompletion($...)
    message: "Google Gemini usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: google
      provider: google

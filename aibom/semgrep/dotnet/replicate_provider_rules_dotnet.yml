rules:
  # Replicate .NET: Replicate NuGet package

  - id: replicate-client-init-dotnet
    pattern-either:
      - pattern: new ReplicateClient($...)
      - pattern: new ReplicateApiClient($...)
      - pattern: ReplicateClient.Create($...)
    message: "Replicate client initialization detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-run-dotnet
    pattern-either:
      - pattern: $CLIENT.Run($...)
      - pattern: $CLIENT.RunAsync($...)
    message: "Replicate model run detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-run-with-model-dotnet
    pattern-regex: '\.(?:Run|RunAsync)\s*\(\s*"([a-zA-Z0-9_\-]+/[a-zA-Z0-9_\-]+[^"]*)"'
    message: "Replicate model detected"
    languages: [csharp]
    severity: WARNING
    metadata:
      category: replicate
      provider: replicate
      model_detection: true

  - id: replicate-predictions-dotnet
    pattern-either:
      - pattern: $CLIENT.CreatePrediction($...)
      - pattern: $CLIENT.CreatePredictionAsync($...)
      - pattern: $CLIENT.GetPrediction($...)
      - pattern: $CLIENT.GetPredictionAsync($...)
      - pattern: $CLIENT.ListPredictions($...)
      - pattern: $CLIENT.ListPredictionsAsync($...)
      - pattern: $CLIENT.CancelPrediction($...)
      - pattern: $CLIENT.CancelPredictionAsync($...)
    message: "Replicate predictions API usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-stream-dotnet
    pattern-either:
      - pattern: $CLIENT.Stream($...)
      - pattern: $CLIENT.StreamAsync($...)
    message: "Replicate streaming detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-training-dotnet
    pattern-either:
      - pattern: $CLIENT.CreateTraining($...)
      - pattern: $CLIENT.CreateTrainingAsync($...)
      - pattern: $CLIENT.GetTraining($...)
      - pattern: $CLIENT.GetTrainingAsync($...)
      - pattern: $CLIENT.ListTrainings($...)
      - pattern: $CLIENT.ListTrainingsAsync($...)
    message: "Replicate training API usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

rules:
  # Microsoft Semantic Kernel (LangChain equivalent for .NET)
  # https://github.com/microsoft/semantic-kernel

  - id: semantic-kernel-builder-dotnet
    pattern-either:
      - pattern: Kernel.CreateBuilder($...)
      - pattern: KernelBuilder.Build($...)
      - pattern: $BUILDER.Build()
    message: "Semantic Kernel builder detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-add-ai-dotnet
    pattern-either:
      - pattern: $BUILDER.AddAzureOpenAIChatCompletion($...)
      - pattern: $BUILDER.AddOpenAIChatCompletion($...)
      - pattern: $BUILDER.AddAzureOpenAITextGeneration($...)
      - pattern: $BUILDER.AddOpenAITextGeneration($...)
      - pattern: $BUILDER.AddHuggingFaceTextGeneration($...)
      - pattern: $BUILDER.AddGoogleAIGeminiChatCompletion($...)
      - pattern: $BUILDER.AddAzureOpenAITextEmbeddingGeneration($...)
      - pattern: $BUILDER.AddOpenAITextEmbeddingGeneration($...)
    message: "Semantic Kernel AI service registration detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-invoke-dotnet
    pattern-either:
      - pattern: $KERNEL.InvokeAsync($...)
      - pattern: $KERNEL.InvokePromptAsync($...)
      - pattern: $KERNEL.InvokeStreamingAsync($...)
      - pattern: $KERNEL.InvokePromptStreamingAsync($...)
    message: "Semantic Kernel invocation detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-plugin-dotnet
    pattern-either:
      - pattern: $KERNEL.ImportPluginFromType<$T>($...)
      - pattern: $KERNEL.ImportPluginFromFunctions($...)
      - pattern: $KERNEL.ImportPluginFromObject($...)
      - pattern: $KERNEL.Plugins.AddFromType<$T>($...)
      - pattern: KernelPluginFactory.CreateFromType<$T>($...)
    message: "Semantic Kernel plugin usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-function-dotnet
    pattern-either:
      - pattern: |
          [KernelFunction]
          ...
      - pattern: KernelFunctionFactory.CreateFromMethod($...)
      - pattern: KernelFunctionFactory.CreateFromPrompt($...)
    message: "Semantic Kernel function definition detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-planner-dotnet
    pattern-either:
      - pattern: new HandlebarsPlanner($...)
      - pattern: new FunctionCallingStepwisePlanner($...)
      - pattern: $PLANNER.CreatePlanAsync($...)
      - pattern: $PLANNER.ExecuteAsync($...)
    message: "Semantic Kernel planner usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-memory-dotnet
    pattern-either:
      - pattern: new SemanticTextMemory($...)
      - pattern: $MEMORY.SaveInformationAsync($...)
      - pattern: $MEMORY.SearchAsync($...)
      - pattern: new VolatileMemoryStore($...)
      - pattern: $BUILDER.AddAzureOpenAITextEmbeddingGeneration($...)
    message: "Semantic Kernel memory/RAG usage detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-chat-history-dotnet
    pattern-either:
      - pattern: new ChatHistory($...)
      - pattern: $HISTORY.AddUserMessage($...)
      - pattern: $HISTORY.AddAssistantMessage($...)
      - pattern: $HISTORY.AddSystemMessage($...)
    message: "Semantic Kernel chat history detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: semantic-kernel-connector-dotnet
    pattern-either:
      - pattern: new AzureOpenAIChatCompletionService($...)
      - pattern: new OpenAIChatCompletionService($...)
      - pattern: new AzureOpenAITextEmbeddingGenerationService($...)
      - pattern: new OpenAITextEmbeddingGenerationService($...)
      - pattern: new HuggingFaceTextGenerationService($...)
    message: "Semantic Kernel AI connector detected"
    languages: [csharp]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain
  # Capture model name from AddOpenAIChatCompletion / AddAzureOpenAIChatCompletion
  # e.g. builder.AddOpenAIChatCompletion("gpt-4o", apiKey)
  - id: semantic-kernel-add-chat-model-dotnet
    pattern-regex: '\.\s*(?:AddOpenAIChatCompletion|AddAzureOpenAIChatCompletion|AddOpenAITextGeneration|AddAzureOpenAITextGeneration|AddOpenAITextEmbeddingGeneration|AddAzureOpenAITextEmbeddingGeneration|AddGoogleAIGeminiChatCompletion)\s*\(\s*"([^"]+)"'
    message: "Semantic Kernel AI model registration detected"
    languages: [csharp]
    severity: WARNING
    metadata:
      category: langchain
      provider: langchain
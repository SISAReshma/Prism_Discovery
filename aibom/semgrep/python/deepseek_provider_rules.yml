rules:
  # ============================================================================
  # DEEPSEEK PROVIDER RULES
  # Covers DeepSeek's own API client AND DeepSeek models running via Ollama
  # or any OpenAI-compatible router (LiteLLM, OpenRouter, etc.)
  # ============================================================================

  # --------------------------------------------------------------------------
  # 1. DeepSeek via OpenAI-compatible client with base_url override
  #    DeepSeek's official Python SDK wraps the openai client with:
  #      client = OpenAI(api_key=..., base_url="https://api.deepseek.com")
  #    This is the strongest fingerprint for DeepSeek-as-provider.
  # --------------------------------------------------------------------------
  - id: deepseek-openai-compat-client
    patterns:
      - pattern: $CLIENT = OpenAI(..., base_url=$URL, ...)
      - metavariable-regex:
          metavariable: $URL
          regex: '"https?://(api\.)?deepseek\.com.*"'
    message: "DeepSeek API client via OpenAI-compatible SDK detected (base_url=$URL)"
    languages: [python]
    severity: INFO
    metadata:
      category: deepseek
      provider: deepseek

  # --------------------------------------------------------------------------
  # 2. DeepSeek model name in model= kwarg — catches all routers
  #    Covers: deepseek-chat, deepseek-reasoner, deepseek-coder,
  #            deepseek-r1, deepseek-v3, deepseek-v2.5, deepseek-r1-distill-*
  # --------------------------------------------------------------------------
  - id: deepseek-model-name-kwarg
    patterns:
      - pattern: $FUNC(..., model=$MODEL, ...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: '"deepseek[-:].*"'
    message: "DeepSeek model $MODEL detected in model= argument"
    languages: [python]
    severity: INFO
    metadata:
      category: deepseek
      provider: deepseek

  # --------------------------------------------------------------------------
  # 3. DeepSeek model as positional string (Ollama-style: generate('deepseek-r1', ...))
  # --------------------------------------------------------------------------
  - id: deepseek-model-positional
    patterns:
      - pattern: $FUNC($MODEL, ...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: '"deepseek[-:].*"'
    message: "DeepSeek model $MODEL used as positional argument"
    languages: [python]
    severity: INFO
    metadata:
      category: deepseek
      provider: deepseek

  # --------------------------------------------------------------------------
  # 4. DeepSeek model assigned to a variable
  #    Catches: model = "deepseek-chat"  /  MODEL = "deepseek-r1"
  # --------------------------------------------------------------------------
  - id: deepseek-model-variable-assignment
    patterns:
      - pattern-either:
          - pattern: $VAR = "$MODEL"
          - pattern: $VAR = '$MODEL'
      - metavariable-regex:
          metavariable: $MODEL
          regex: '^deepseek[-:].*'
    message: "DeepSeek model name $MODEL assigned to variable"
    languages: [python]
    severity: INFO
    metadata:
      category: deepseek
      provider: deepseek

  # --------------------------------------------------------------------------
  # 5. DeepSeek chat/completions call
  #    Covers the official SDK pattern:
  #      response = client.chat.completions.create(model="deepseek-chat", ...)
  # --------------------------------------------------------------------------
  - id: deepseek-chat-completions
    pattern-either:
      - pattern: $CLIENT.chat.completions.create(..., model="deepseek-chat", ...)
      - pattern: $CLIENT.chat.completions.create(..., model="deepseek-reasoner", ...)
      - pattern: $CLIENT.chat.completions.create(..., model="deepseek-coder", ...)
    message: "DeepSeek chat completions API call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: deepseek
      provider: deepseek

  # --------------------------------------------------------------------------
  # 6. DeepSeek Reasoner — thinking content extraction
  #    R1 responses include a reasoning_content field (chain-of-thought).
  #    Accessing it is a unique DeepSeek-R1 fingerprint.
  # --------------------------------------------------------------------------
  - id: deepseek-reasoner-thinking
    pattern-either:
      - pattern: $MSG.reasoning_content
      - pattern: $CHOICE.message.reasoning_content
    message: "DeepSeek Reasoner (R1) reasoning_content access detected — chain-of-thought output"
    languages: [python]
    severity: INFO
    metadata:
      category: deepseek
      provider: deepseek
      model_family: deepseek-r1

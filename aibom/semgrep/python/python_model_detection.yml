rules:
  # ============================================================================
  # PYTHON MODEL NAME DETECTION RULES
  # Captures model declarations in various patterns
  # ============================================================================

  # --------------------------------------------------------------------------
  # 1. Direct variable assignment: model = "gpt-4"
  # --------------------------------------------------------------------------
  - id: python-model-variable-assignment
    languages: [python]
    message: "Model name detected in variable assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: variable_assignment
      confidence: "0.95"
      tags: [python, model, variable]
    patterns:
      - pattern-either:
          - pattern: $VAR = "$VALUE"
          - pattern: $VAR = '$VALUE'
      - metavariable-regex:
          metavariable: $VAR
          regex: '^(model|models|model_name|model_id|MODEL|MODELS|MODEL_NAME|model_type|llm_model|ai_model|engine|deployment|deployment_name)$'

  # --------------------------------------------------------------------------
  # 2. Type-annotated variable assignment: model: str = "gpt-4"
  # --------------------------------------------------------------------------
  - id: python-model-typed-assignment
    languages: [python]
    message: "Model name detected in typed variable: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: typed_assignment
      confidence: "0.95"
      tags: [python, model, typed]
    patterns:
      - pattern-either:
          - pattern: '$VAR: $TYPE = "$VALUE"'
          - pattern: "$VAR: $TYPE = '$VALUE'"
      - metavariable-regex:
          metavariable: $VAR
          regex: '^(model|models|model_name|model_id|MODEL|MODELS|MODEL_NAME|model_type|llm_model|ai_model|engine|deployment)$'

  # --------------------------------------------------------------------------
  # 3. Function/method keyword arguments: func(model="gpt-4")
  # --------------------------------------------------------------------------
  - id: python-model-function-kwarg
    languages: [python]
    message: "Model name detected in function call: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: function_kwarg
      confidence: "0.98"
      tags: [python, model, function]
    patterns:
      - pattern-either:
          - pattern: $FUNC(..., model="$VALUE", ...)
          - pattern: $FUNC(..., model='$VALUE', ...)
          - pattern: $FUNC(..., model_name="$VALUE", ...)
          - pattern: $FUNC(..., model_name='$VALUE', ...)
          - pattern: $FUNC(..., model_id="$VALUE", ...)
          - pattern: $FUNC(..., model_id='$VALUE', ...)
          - pattern: $FUNC(..., engine="$VALUE", ...)
          - pattern: $FUNC(..., engine='$VALUE', ...)
          - pattern: $FUNC(..., deployment="$VALUE", ...)
          - pattern: $FUNC(..., deployment_name="$VALUE", ...)

  # --------------------------------------------------------------------------
  # 4. Method calls: client.method(model="gpt-4")
  # --------------------------------------------------------------------------
  - id: python-model-method-call
    languages: [python]
    message: "Model name detected in method call: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: method_call
      confidence: "0.98"
      tags: [python, model, method]
    patterns:
      - pattern-either:
          - pattern: $OBJ.$METHOD(..., model="$VALUE", ...)
          - pattern: $OBJ.$METHOD(..., model='$VALUE', ...)
          - pattern: $OBJ.$METHOD(..., model_name="$VALUE", ...)
          - pattern: $OBJ.$METHOD(..., model_name='$VALUE', ...)
          - pattern: $OBJ.$METHOD(..., engine="$VALUE", ...)
          - pattern: $OBJ.$METHOD(..., deployment="$VALUE", ...)

  # --------------------------------------------------------------------------
  # 5. Dictionary literal: {"model": "gpt-4"}
  # --------------------------------------------------------------------------
  - id: python-model-dict-literal
    languages: [python]
    message: "Model name detected in dictionary: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: dict_literal
      confidence: "0.90"
      tags: [python, model, dict]
    patterns:
      - pattern-either:
          - pattern: '{..., "model": "$VALUE", ...}'
          - pattern: "{..., 'model': '$VALUE', ...}"
          - pattern: '{..., "model_name": "$VALUE", ...}'
          - pattern: "{..., 'model_name': '$VALUE', ...}"
          - pattern: '{..., "model_id": "$VALUE", ...}'
          - pattern: '{..., "engine": "$VALUE", ...}'
          - pattern: '{..., "deployment": "$VALUE", ...}'
          - pattern: '{..., "deployment_name": "$VALUE", ...}'

  # --------------------------------------------------------------------------
  # 6. Dictionary assignment: config["model"] = "gpt-4"
  # --------------------------------------------------------------------------
  - id: python-model-dict-assignment
    languages: [python]
    message: "Model name detected in dictionary assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: dict_assignment
      confidence: "0.92"
      tags: [python, model, dict_assign]
    patterns:
      - pattern-either:
          - pattern: '$DICT["model"] = "$VALUE"'
          - pattern: "$DICT['model'] = '$VALUE'"
          - pattern: '$DICT["model_name"] = "$VALUE"'
          - pattern: "$DICT['model_name'] = '$VALUE'"
          - pattern: '$DICT["model_id"] = "$VALUE"'
          - pattern: '$DICT["engine"] = "$VALUE"'
          - pattern: '$DICT["deployment"] = "$VALUE"'
          - pattern: '$DICT["deployment_name"] = "$VALUE"'

  # --------------------------------------------------------------------------
  # 7. Class attribute assignment: self.model = "gpt-4"
  # --------------------------------------------------------------------------
  - id: python-model-class-attribute
    languages: [python]
    message: "Model name detected in class attribute: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: class_attribute
      confidence: "0.93"
      tags: [python, model, class]
    patterns:
      - pattern-either:
          - pattern: self.model = "$VALUE"
          - pattern: self.model = '$VALUE'
          - pattern: self.model_name = "$VALUE"
          - pattern: self.model_name = '$VALUE'
          - pattern: self.model_id = "$VALUE"
          - pattern: self.engine = "$VALUE"
          - pattern: self.deployment = "$VALUE"
          - pattern: self.deployment_name = "$VALUE"

  # --------------------------------------------------------------------------
  # 8. Environment variable access: os.getenv("MODEL_NAME")
  # --------------------------------------------------------------------------
  - id: python-model-env-var
    languages: [python]
    message: "Model name environment variable detected: $VAR"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: env_var
      confidence: "0.85"
      tags: [python, model, env]
    patterns:
      - pattern-either:
          - pattern: os.getenv("$VAR", ...)
          - pattern: os.getenv('$VAR', ...)
          - pattern: os.environ.get("$VAR", ...)
          - pattern: os.environ.get('$VAR', ...)
          - pattern: os.environ["$VAR"]
          - pattern: os.environ['$VAR']
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i).*(MODEL|ENGINE|DEPLOYMENT).*'

  # --------------------------------------------------------------------------
  # 9. Config file access: config.get("model")
  # --------------------------------------------------------------------------
  - id: python-model-config-get
    languages: [python]
    message: "Model name config key detected: $KEY"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: config_access
      confidence: "0.80"
      tags: [python, model, config]
    patterns:
      - pattern-either:
          - pattern: $OBJ.get("$KEY", ...)
          - pattern: $OBJ.get('$KEY', ...)
          - pattern: $OBJ["$KEY"]
          - pattern: $OBJ['$KEY']
      - metavariable-regex:
          metavariable: $KEY
          regex: '^(model|model_name|model_id|engine|deployment|deployment_name|MODEL|MODEL_NAME)$'

  # --------------------------------------------------------------------------
  # 10. List of models: models = ["gpt-4", "claude-3"]
  # Captures each individual string in the list as a separate finding
  # Variable names are matched flexibly to catch all model-related patterns
  # --------------------------------------------------------------------------
  - id: python-model-list-assignment
    languages: [python]
    message: "Model detected in list: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: list_assignment
      confidence: "0.90"
      tags: [python, model, list]
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = [..., "$VALUE", ...]
          - pattern: |
              $VAR = [..., '$VALUE', ...]
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(models?|model[_\-]?(name|id|list|names|type)?|ai[_\-]?models?|llm[_\-]?models?|available[_\-]?models?|supported[_\-]?models?|default[_\-]?models?|allowed[_\-]?models?)$'

  # --------------------------------------------------------------------------
  # 11. F-string with model: model = f"gpt-{version}"
  # --------------------------------------------------------------------------
  - id: python-model-fstring
    languages: [python]
    message: "Model name with f-string formatting detected"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: fstring
      confidence: "0.75"
      tags: [python, model, fstring]
    patterns:
      - pattern-either:
          - pattern: $VAR = f"...$CONTENT..."
          - pattern: $VAR = f'...$CONTENT...'
      - metavariable-regex:
          metavariable: $VAR
          regex: '^(model|model_name|MODEL|engine|deployment)$'

  # --------------------------------------------------------------------------
  # 12. Common AI library patterns (OpenAI, Anthropic, HuggingFace, etc.)
  # --------------------------------------------------------------------------
  - id: python-model-ai-sdk-patterns
    languages: [python]
    message: "AI SDK model parameter detected: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: ai_sdk
      confidence: "0.99"
      tags: [python, model, ai_sdk]
    patterns:
      - pattern-either:
          # OpenAI patterns
          - pattern: openai.ChatCompletion.create(..., model="$VALUE", ...)
          - pattern: openai.Completion.create(..., model="$VALUE", ...)
          - pattern: client.chat.completions.create(..., model="$VALUE", ...)
          - pattern: $CLIENT.chat.completions.create(..., model="$VALUE", ...)
          # Anthropic patterns
          - pattern: anthropic.Anthropic().messages.create(..., model="$VALUE", ...)
          - pattern: client.messages.create(..., model="$VALUE", ...)
          - pattern: client.completions.create(..., model="$VALUE", ...)
          - pattern: $CLIENT.messages.create(..., model="$VALUE", ...)
          - pattern: $CLIENT.completions.create(..., model="$VALUE", ...)
          # HuggingFace patterns
          - pattern: AutoModelForCausalLM.from_pretrained("$VALUE", ...)
          - pattern: AutoModel.from_pretrained("$VALUE", ...)
          - pattern: pipeline(..., model="$VALUE", ...)
          # LangChain patterns
          - pattern: ChatOpenAI(model="$VALUE", ...)
          - pattern: ChatOpenAI(model_name="$VALUE", ...)
          - pattern: OpenAI(model="$VALUE", ...)
          - pattern: Anthropic(model="$VALUE", ...)
          # Google patterns
          - pattern: genai.GenerativeModel("$VALUE")

  # --------------------------------------------------------------------------
  # 13. Regex pattern to catch any model-like assignment
  # --------------------------------------------------------------------------
  - id: python-model-regex-catch-all
    languages: [python]
    message: "Potential model name detected in assignment"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: regex_catchall
      confidence: "0.70"
      tags: [python, model, regex]
    pattern-regex: '(?i)(model|engine|deployment)(?:_name|_id|)?\s*[=:]\s*["'']([^"'']+)["'']'

  # --------------------------------------------------------------------------
  # 14. Dictionary key with config/class value: {"gpt-4": SomeConfig(...)}
  # Only matches known AI model name patterns as dict keys
  # --------------------------------------------------------------------------
  - id: python-model-dict-key-config
    languages: [python]
    message: "Model detected as dict key with config: $MODEL"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: dict_key_config
      confidence: "0.95"
      tags: [python, model, dict_key]
    patterns:
      - pattern-either:
          - pattern: |
              { ..., "$MODEL": $CONFIG(...), ... }
          - pattern: |
              { ..., '$MODEL': $CONFIG(...), ... }
      - metavariable-regex:
          metavariable: $MODEL
          regex: '(?i)^(gpt-[0-9a-z\.\-]+|o[0-9]+(-mini|-preview)?|claude[a-z0-9\.\-]*|llama[a-z0-9\.\-]*|mistral[a-z0-9\.\-]*|gemini[a-z0-9\.\-]*|deepseek[a-z0-9\.\-]*|codellama[a-z0-9\.\-]*|text-embedding[a-z0-9\.\-]*|whisper[a-z0-9\.\-]*|dall-e[a-z0-9\.\-]*|stable-diffusion[a-z0-9\.\-]*|phi[a-z0-9\.\-]*|qwen[a-z0-9\.\-]*|falcon[a-z0-9\.\-]*|vicuna[a-z0-9\.\-]*|command[a-z0-9\.\-]*)$'

  # --------------------------------------------------------------------------
  # 15. Dictionary key with any value: {"gpt-4": ...}
  # --------------------------------------------------------------------------
  - id: python-model-dict-key-value
    languages: [python]
    message: "Model detected as dict key: $MODEL"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: dict_key
      confidence: "0.85"
      tags: [python, model, dict_key]
    patterns:
      - pattern-either:
          - pattern: |
              { ..., "$MODEL": $VALUE, ... }
          - pattern: |
              { ..., '$MODEL': $VALUE, ... }
      - metavariable-regex:
          metavariable: $MODEL
          regex: '(?i)^(gpt-[0-9a-z\.\-]+|claude[a-z0-9\.\-]*|llama[a-z0-9\.\-]*|mistral[a-z0-9\.\-]*|gemini[a-z0-9\.\-]*|o[0-9]+(-mini|-preview)?|deepseek[a-z0-9\.\-]*|code[a-z0-9\.\-]*|text-embedding[a-z0-9\.\-]*)$'

  # --------------------------------------------------------------------------
  # 16. Nested dictionary with model keys in provider mapping
  # --------------------------------------------------------------------------
  - id: python-model-provider-dict
    languages: [python]
    message: "Model in provider config dict: $MODEL"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: provider_dict
      confidence: "0.95"
      tags: [python, model, provider_dict]
    pattern-regex: '(?:OPENAI|ANTHROPIC|GEMINI|META|MISTRAL|GROQ|AZURE|COHERE|OLLAMA)[^{]*\{[^}]*["'']([a-zA-Z0-9][-a-zA-Z0-9._]+)["'']\s*:\s*(?:LLM|Model|Config|Dict|\{)'

  # --------------------------------------------------------------------------
  # 17. Class attribute dictionary with model configs
  # --------------------------------------------------------------------------
  - id: python-model-class-dict-attribute
    languages: [python]
    message: "Model in class dict attribute: $MODEL"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: class_dict_attr
      confidence: "0.90"
      tags: [python, model, class_dict]
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS:
                  ...
                  $ATTR: $TYPE = { ..., "$MODEL": $VALUE, ... }
          - pattern: |
              class $CLASS:
                  ...
                  $ATTR = { ..., "$MODEL": $VALUE, ... }
      - metavariable-regex:
          metavariable: $ATTR
          regex: '(?i)^(_?model|_?models|_?config|_?defaults|_?settings|_?registry|_?mapping|supported)'

  # --------------------------------------------------------------------------
  # 18. Model name in tuple/list as first element with config
  # Only matches known AI model name patterns - NOT generic dict keys!
  # --------------------------------------------------------------------------
  - id: python-model-tuple-config
    languages: [python]
    message: "Model in tuple/list config: $MODEL"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: tuple_config
      confidence: "0.85"
      tags: [python, model, tuple]
    patterns:
      - pattern-either:
          - pattern: |
              ("$MODEL", $CONFIG)
          - pattern: |
              ('$MODEL', $CONFIG)
          - pattern: |
              ["$MODEL", $CONFIG]
          - pattern: |
              ['$MODEL', $CONFIG]
      - metavariable-regex:
          metavariable: $MODEL
          regex: '(?i)^(gpt-[0-9a-z\.\-]+|o[0-9]+(-mini|-preview)?|claude[a-z0-9\.\-]*|llama[a-z0-9\.\-]*|mistral[a-z0-9\.\-]*|gemini[a-z0-9\.\-]*|deepseek[a-z0-9\.\-]*|codellama[a-z0-9\.\-]*|text-embedding[a-z0-9\.\-]*|whisper[a-z0-9\.\-]*|dall-e[a-z0-9\.\-]*|stable-diffusion[a-z0-9\.\-]*|phi[a-z0-9\.\-]*|qwen[a-z0-9\.\-]*|falcon[a-z0-9\.\-]*|vicuna[a-z0-9\.\-]*|command[a-z0-9\.\-]*)$'

  # ==========================================================================
  # VARIABLE-INDIRECTION RULES
  # Catches model names passed via variables (not string literals) to AI SDKs.
  # These are commonly missed because the model string is assigned to a
  # variable/parameter and then passed to from_pretrained(), pipeline(), etc.
  # ==========================================================================

  # --------------------------------------------------------------------------
  # 19. Function/constructor default parameter with model-like string
  #     Catches: def __init__(self, model="microsoft/Phi-3.5-mini-instruct")
  # --------------------------------------------------------------------------
  - id: python-model-function-default-param
    languages: [python]
    message: "Model name in function default parameter: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: function_default
      confidence: "0.92"
      tags: [python, model, function_default]
    patterns:
      - pattern-either:
          - pattern: |
              def $FUNC(..., $PARAM="$VALUE", ...):
                  ...
          - pattern: |
              def $FUNC(..., $PARAM='$VALUE', ...):
                  ...
      - metavariable-regex:
          metavariable: $PARAM
          regex: '(?i)^(model|model_name|model_id|llm_model|ai_model|engine|deployment|deployment_name|distilbert_dir|bert_dir|llm_dir|model_dir|model_path|pretrained_model|base_model|checkpoint)$'

  # --------------------------------------------------------------------------
  # 20. Function default with HuggingFace-style org/model path
  #     Catches: def __init__(self, llm_model="microsoft/Phi-3.5-mini-instruct")
  # --------------------------------------------------------------------------
  - id: python-model-function-default-hf-path
    languages: [python]
    message: "HuggingFace model path in function default: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: function_default_hf
      confidence: "0.95"
      tags: [python, model, function_default, huggingface]
    patterns:
      - pattern-either:
          - pattern: |
              def $FUNC(..., $PARAM="$VALUE", ...):
                  ...
          - pattern: |
              def $FUNC(..., $PARAM='$VALUE', ...):
                  ...
      - metavariable-regex:
          metavariable: $VALUE
          regex: '^[a-zA-Z0-9_\-]+/[a-zA-Z0-9_\.\-]+'

  # --------------------------------------------------------------------------
  # 21. from_pretrained with variable (not string literal)
  #     Catches: AutoModelForCausalLM.from_pretrained(model_dir, ...)
  # --------------------------------------------------------------------------
  - id: python-model-from-pretrained-variable
    languages: [python]
    message: "from_pretrained called with variable (model resolved elsewhere): $VAR"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: from_pretrained_var
      confidence: "0.80"
      tags: [python, model, from_pretrained, variable]
    patterns:
      - pattern-either:
          - pattern: AutoModelForCausalLM.from_pretrained($VAR, ...)
          - pattern: AutoModelForSequenceClassification.from_pretrained($VAR, ...)
          - pattern: AutoModelForSeq2SeqLM.from_pretrained($VAR, ...)
          - pattern: AutoModelForTokenClassification.from_pretrained($VAR, ...)
          - pattern: AutoModelForQuestionAnswering.from_pretrained($VAR, ...)
          - pattern: AutoModel.from_pretrained($VAR, ...)
          - pattern: AutoTokenizer.from_pretrained($VAR, ...)
      - metavariable-regex:
          metavariable: $VAR
          regex: '^(?!["'']).*'

  # --------------------------------------------------------------------------
  # 22. pipeline() called with variable model argument
  #     Catches: pipeline("text-generation", model=model_name)
  # --------------------------------------------------------------------------
  - id: python-model-pipeline-variable
    languages: [python]
    message: "HuggingFace pipeline with variable model: $VAR"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: pipeline_var
      confidence: "0.80"
      tags: [python, model, pipeline, variable]
    pattern-either:
      - pattern: pipeline(..., model=$VAR, ...)
      - pattern: transformers.pipeline(..., model=$VAR, ...)

  # --------------------------------------------------------------------------
  # 23. Model name strings in pattern lists/tuples used for model type checks
  #     Catches: new_model_patterns = ['o1-', 'o3-', 'gpt-4o', 'gpt-5']
  # --------------------------------------------------------------------------
  - id: python-model-pattern-list
    languages: [python]
    message: "Model name pattern in list: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: pattern_list
      confidence: "0.75"
      tags: [python, model, pattern_list]
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = [..., "$VALUE", ...]
          - pattern: |
              $VAR = [..., '$VALUE', ...]
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(.*model.*pattern|.*pattern.*model|reject_pattern|accept_pattern|new_model_pattern|no_temp_pattern|vision_pattern|reject|accept)s?$'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '(?i)^(gpt-|o[0-9]|claude|llama|mistral|gemini|whisper|dall-e|stable-?diffusion|phi-|qwen|falcon|deepseek|vicuna|midjourney|imagen|sdxl|tts|wav2vec|bge-|gte-|sentence-transformer)'

  # --------------------------------------------------------------------------
  # 24. Model detection regex patterns (code that identifies models by regex)
  #     Catches: (r'(gpt|llama|mistral|claude|...)', 'text')
  # --------------------------------------------------------------------------
  - id: python-model-regex-pattern-tuple
    languages: [python]
    message: "Model detection regex pattern: $PATTERN"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: regex_detection_pattern
      confidence: "0.70"
      tags: [python, model, regex_pattern]
    pattern-regex: '\(r["\''](.*(?:gpt|llama|mistral|claude|gemini|whisper|dall-e|stable.?diffusion|phi|qwen|falcon|deepseek|vicuna|anthropic|openai)[^"'']*)["\'']\s*,\s*["\''](text|image|audio|embedding|vision|classification|model_type|reject|accept)["\'']\)'

  # --------------------------------------------------------------------------
  # 25. Groq/OpenAI-compatible client with variable model
  #     Catches: client.chat.completions.create(model=LLM_MODEL, ...)
  # --------------------------------------------------------------------------
  - id: python-model-chat-completions-variable
    languages: [python]
    message: "Chat completions API call with variable model"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: chat_completions_var
      confidence: "0.85"
      tags: [python, model, api_call, variable]
    pattern-either:
      - pattern: $CLIENT.chat.completions.create(..., model=$VAR, ...)
      - pattern: $CLIENT.completions.create(..., model=$VAR, ...)
      - pattern: $CLIENT.messages.create(..., model=$VAR, ...)

  # --------------------------------------------------------------------------
  # 26. os.getenv() / os.environ with model-value default
  #     Catches: LLM_MODEL = os.getenv("GROQ_MODEL", "openai/gpt-oss-20b")
  # --------------------------------------------------------------------------
  - id: python-model-env-with-default
    languages: [python]
    message: "Model name in environment variable default: $DEFAULT"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: env_default
      confidence: "0.90"
      tags: [python, model, env_default]
    patterns:
      - pattern-either:
          - pattern: $VAR = os.getenv("$KEY", "$DEFAULT")
          - pattern: $VAR = os.getenv('$KEY', '$DEFAULT')
          - pattern: $VAR = os.environ.get("$KEY", "$DEFAULT")
          - pattern: $VAR = os.environ.get('$KEY', '$DEFAULT')
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i).*(MODEL|ENGINE|DEPLOYMENT|LLM).*'

  # --------------------------------------------------------------------------
  # 27. Local model directory references (models loaded from disk)
  #     Catches: distilbert_dir="refusal_classifier_model"
  # --------------------------------------------------------------------------
  - id: python-model-local-dir-default
    languages: [python]
    message: "Local model directory reference: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: local_model_dir
      confidence: "0.88"
      tags: [python, model, local_dir]
    patterns:
      - pattern-either:
          - pattern: |
              def $FUNC(..., $PARAM="$VALUE", ...):
                  ...
          - pattern: |
              def $FUNC(..., $PARAM='$VALUE', ...):
                  ...
          - pattern: $VAR = "$VALUE"
          - pattern: $VAR = '$VALUE'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '(?i)^[a-zA-Z0-9_\-]*(model|classifier|bert|gpt|llm|transformer|checkpoint|weights)[a-zA-Z0-9_\-]*$'

  # --------------------------------------------------------------------------
  # 28. S3 bucket model path references
  #     Catches: bucket_path = "s3://bucket-name/path/to/model.zip"
  # --------------------------------------------------------------------------
  - id: python-model-s3-path
    languages: [python]
    message: "S3 model path detected: $VALUE"
    severity: WARNING
    metadata:
      category: model_detection

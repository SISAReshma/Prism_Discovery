rules:
  # =========================================================================
  # AI PROVIDER API ENDPOINT DETECTION
  # Detects HTTP calls targeting known AI provider domains.
  # Works with ANY HTTP library (requests, httpx, urllib, aiohttp).
  # =========================================================================

  # --- OpenAI ---
  - id: ai-api-openai-endpoint
    pattern-either:
      - pattern: requests.post("https://api.openai.com/...", ...)
      - pattern: requests.get("https://api.openai.com/...", ...)
      - pattern: requests.post($URL, ...) 
      - pattern: httpx.post("https://api.openai.com/...", ...)
      - pattern: httpx.get("https://api.openai.com/...", ...)
    patterns:
      - pattern-either:
          - pattern: requests.post($URL, ...)
          - pattern: requests.get($URL, ...)
          - pattern: httpx.post($URL, ...)
          - pattern: httpx.get($URL, ...)
          - pattern: await $CLIENT.post($URL, ...)
          - pattern: await $CLIENT.get($URL, ...)
      - metavariable-regex:
          metavariable: $URL
          regex: .*api\.openai\.com.*
    message: "HTTP call to OpenAI API endpoint detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      api_type: direct_http
      provider: openai
      is_ai_endpoint: true


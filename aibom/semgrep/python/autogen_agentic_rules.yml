rules:
  # =========================================================================
  # AutoGen / AG2 Agent Detection
  # =========================================================================
  - id: autogen-assistant-agent
    patterns:
      - pattern-either:
          - pattern: AssistantAgent(..., name=$NAME, ...)
          - pattern: autogen.AssistantAgent(..., name=$NAME, ...)
    message: "AutoGen AssistantAgent detected: $NAME"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: autogen
      asset_type: agent
      extract_fields: "name,system_message,llm_config"

  - id: autogen-assistant-system-message
    patterns:
      - pattern-either:
          - pattern: AssistantAgent(..., system_message=$MSG, ...)
          - pattern: autogen.AssistantAgent(..., system_message=$MSG, ...)
    message: "AutoGen AssistantAgent system_message: $MSG"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: autogen
      asset_type: agent
      extract_fields: "name,system_message,llm_config"

  - id: autogen-conversable-agent
    patterns:
      - pattern-either:
          - pattern: ConversableAgent(..., name=$NAME, ...)
          - pattern: autogen.ConversableAgent(..., name=$NAME, ...)
    message: "AutoGen ConversableAgent detected: $NAME"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: autogen
      asset_type: agent
      extract_fields: "name,system_message,llm_config,human_input_mode"

  - id: autogen-user-proxy-agent
    patterns:
      - pattern-either:
          - pattern: UserProxyAgent(..., name=$NAME, ...)
          - pattern: autogen.UserProxyAgent(..., name=$NAME, ...)
    message: "AutoGen UserProxyAgent detected: $NAME"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: autogen
      asset_type: agent
      extract_fields: "name,human_input_mode,code_execution_config"

  # =========================================================================
  # AutoGen GroupChat Detection
  # =========================================================================
  - id: autogen-groupchat
    patterns:
      - pattern-either:
          - pattern: GroupChat(..., agents=$AGENTS, ...)
          - pattern: autogen.GroupChat(..., agents=$AGENTS, ...)
    message: "AutoGen GroupChat detected"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: autogen
      asset_type: crew
      extract_fields: "agents,messages,max_round"

  - id: autogen-groupchat-manager
    patterns:
      - pattern-either:
          - pattern: GroupChatManager(...)
          - pattern: autogen.GroupChatManager(...)
    message: "AutoGen GroupChatManager detected"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: autogen
      asset_type: crew
      extract_fields: "groupchat,llm_config"

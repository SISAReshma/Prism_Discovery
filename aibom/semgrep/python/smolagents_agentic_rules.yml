rules:
  # =========================================================================
  # Smolagents
  # =========================================================================
  - id: smolagents-tool-calling-agent
    patterns:
      - pattern-either:
          - pattern: ToolCallingAgent(...)
          - pattern: smolagents.ToolCallingAgent(...)
    message: "Smolagents ToolCallingAgent detected"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: smolagents
      asset_type: agent
      extract_fields: "tools,model,name,description"

  - id: smolagents-code-agent
    patterns:
      - pattern-either:
          - pattern: CodeAgent(...)
          - pattern: smolagents.CodeAgent(...)
    message: "Smolagents CodeAgent detected"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: smolagents
      asset_type: agent
      extract_fields: "tools,model,name,description"

  - id: smolagents-managed-agent
    patterns:
      - pattern-either:
          - pattern: ManagedAgent(..., name=$NAME, ...)
          - pattern: smolagents.ManagedAgent(..., name=$NAME, ...)
    message: "Smolagents ManagedAgent detected: $NAME"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: smolagents
      asset_type: agent
      extract_fields: "agent,name,description"

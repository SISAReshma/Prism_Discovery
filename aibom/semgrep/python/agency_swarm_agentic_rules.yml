rules:
  # =========================================================================
  # Agency Swarm
  # =========================================================================
  - id: agency-swarm-agent
    patterns:
      - pattern-either:
          - pattern: Agent(..., name=$NAME, ...)
          - pattern: agency_swarm.Agent(..., name=$NAME, ...)
    message: "Agency Swarm Agent detected: $NAME"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: agency-swarm
      asset_type: agent
      extract_fields: "name,description,instructions,tools"

  - id: agency-swarm-agency
    patterns:
      - pattern-either:
          - pattern: Agency(...)
          - pattern: agency_swarm.Agency(...)
    message: "Agency Swarm Agency detected"
    languages: [python]
    severity: INFO
    metadata:
      category: agentic_framework
      framework: agency-swarm
      asset_type: crew
      extract_fields: "agency_chart,shared_instructions"

rules:
  - id: cohere-client-init
    pattern-either:
      - pattern: cohere.Client(...)
      - pattern: cohere.ClientV2(...)
      - pattern: CohereClient(...)
    message: "Cohere client initialization detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-generate
    # Import guard: only fire when cohere is actually imported in the file.
    # Prevents false positives on ollama/replicate code that also has .generate()/.chat()
    patterns:
      - pattern-either:
          - pattern: $COHERE.generate(...)
          - pattern: $COHERE.chat(...)
          - pattern: $COHERE.chat_stream(...)
      - pattern-either:
          - pattern-inside: |
              import cohere
              ...
          - pattern-inside: |
              from cohere import $ITEM
              ...
    message: "Cohere text generation detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-embed
    patterns:
      - pattern-either:
          - pattern: $COHERE.embed(...)
          - pattern: $COHERE.embed_jobs.create(...)
      - pattern-either:
          - pattern-inside: |
              import cohere
              ...
          - pattern-inside: |
              from cohere import $ITEM
              ...
    message: "Cohere embedding detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-classify
    patterns:
      - pattern: $COHERE.classify(...)
      - pattern-either:
          - pattern-inside: |
              import cohere
              ...
          - pattern-inside: |
              from cohere import $ITEM
              ...
    message: "Cohere classification detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-rerank
    patterns:
      - pattern-either:
          - pattern: $COHERE.rerank(...)
          - pattern: $COHERE.rerank_v2(...)
      - pattern-either:
          - pattern-inside: |
              import cohere
              ...
          - pattern-inside: |
              from cohere import $ITEM
              ...
    message: "Cohere rerank detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-summarize
    patterns:
      - pattern: $COHERE.summarize(...)
      - pattern-either:
          - pattern-inside: |
              import cohere
              ...
          - pattern-inside: |
              from cohere import $ITEM
              ...
    message: "Cohere summarization detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-langchain
    pattern-either:
      - pattern: ChatCohere(...)
      - pattern: CohereEmbeddings(...)
      - pattern: CohereRerank(...)
    message: "Cohere LangChain integration detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

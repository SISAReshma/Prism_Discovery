rules:
  - id: cohere-client-init
    pattern-either:
      - pattern: cohere.Client(...)
      - pattern: cohere.ClientV2(...)
      - pattern: CohereClient(...)
    message: "Cohere client initialization detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-generate
    pattern-either:
      - pattern: $COHERE.generate(...)
      - pattern: $COHERE.chat(...)
      - pattern: $COHERE.chat_stream(...)
    message: "Cohere text generation detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-embed
    pattern-either:
      - pattern: $COHERE.embed(...)
      - pattern: $COHERE.embed_jobs.create(...)
    message: "Cohere embedding detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-classify
    pattern-either:
      - pattern: $COHERE.classify(...)
    message: "Cohere classification detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-rerank
    pattern-either:
      - pattern: $COHERE.rerank(...)
      - pattern: $COHERE.rerank_v2(...)
    message: "Cohere rerank detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-summarize
    pattern-either:
      - pattern: $COHERE.summarize(...)
    message: "Cohere summarization detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-langchain
    pattern-either:
      - pattern: ChatCohere(...)
      - pattern: CohereEmbeddings(...)
      - pattern: CohereRerank(...)
    message: "Cohere LangChain integration detected"
    languages: [python]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

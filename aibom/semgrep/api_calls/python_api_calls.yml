rules:
  # =========================================================================
  # REQUESTS LIBRARY — generic catch-all (http_method resolved from code line)
  # NOTE: Use bare "..." (not "$...") for ellipsis/variadic args in semgrep
  # =========================================================================
  - id: api-requests-call
    pattern-either:
      - pattern: requests.get($URL, ...)
      - pattern: requests.post($URL, ...)
      - pattern: requests.put($URL, ...)
      - pattern: requests.patch($URL, ...)
      - pattern: requests.delete($URL, ...)
      - pattern: requests.head($URL, ...)
      - pattern: requests.options($URL, ...)
      - pattern: requests.request($METHOD, $URL, ...)
    message: "Python requests library call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: ANY

  - id: api-requests-session
    pattern-either:
      - pattern: $SESSION.get($URL, ...)
      - pattern: $SESSION.post($URL, ...)
      - pattern: $SESSION.put($URL, ...)
      - pattern: $SESSION.patch($URL, ...)
      - pattern: $SESSION.delete($URL, ...)
    message: "Python requests session call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: ANY

  # requests imported with alias: import requests as rq; rq.get(...)
  - id: api-requests-alias-call
    patterns:
      - pattern-inside: |
          import requests as $REQ
          ...
      - pattern-either:
          - pattern: $REQ.get($URL, ...)
          - pattern: $REQ.post($URL, ...)
          - pattern: $REQ.put($URL, ...)
          - pattern: $REQ.patch($URL, ...)
          - pattern: $REQ.delete($URL, ...)
          - pattern: $REQ.head($URL, ...)
          - pattern: $REQ.options($URL, ...)
          - pattern: $REQ.request($METHOD, $URL, ...)
    message: "Python requests (aliased) call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: ANY

  # NOTE: api-requests-from-import-call removed — pattern-inside with ellipsis
  # causes parse errors in semgrep. Covered by api-requests-call rule.

  # Structured rules — capture $BODY and $HEADERS for enrichment
  - id: api-requests-post-json
    patterns:
      - pattern: requests.post($URL, json=$BODY, headers=$HEADERS, ...)
    message: "requests.post with JSON body and headers"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: POST

  - id: api-requests-post-json-nobody
    patterns:
      - pattern: requests.post($URL, json=$BODY, ...)
    message: "requests.post with JSON body"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: POST

  - id: api-requests-post-data
    patterns:
      - pattern: requests.post($URL, data=$BODY, ...)
    message: "requests.post with form data body"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: POST

  - id: api-requests-get-headers
    patterns:
      - pattern: requests.get($URL, headers=$HEADERS, ...)
    message: "requests.get with headers"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: GET

  - id: api-requests-put-json
    patterns:
      - pattern: requests.put($URL, json=$BODY, ...)
    message: "requests.put with JSON body"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: PUT

  - id: api-requests-patch-json
    patterns:
      - pattern: requests.patch($URL, json=$BODY, ...)
    message: "requests.patch with JSON body"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: requests
      http_method: PATCH

  # =========================================================================
  # HTTPX
  # =========================================================================
  - id: api-httpx-call
    pattern-either:
      - pattern: httpx.get($URL, ...)
      - pattern: httpx.post($URL, ...)
      - pattern: httpx.put($URL, ...)
      - pattern: httpx.patch($URL, ...)
      - pattern: httpx.delete($URL, ...)
      - pattern: httpx.request($METHOD, $URL, ...)
    message: "Python httpx library call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: httpx
      http_method: ANY

  - id: api-httpx-async
    pattern-either:
      - pattern: await $CLIENT.get($URL, ...)
      - pattern: await $CLIENT.post($URL, ...)
      - pattern: await $CLIENT.put($URL, ...)
      - pattern: await $CLIENT.patch($URL, ...)
      - pattern: await $CLIENT.delete($URL, ...)
    message: "Python httpx async call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: httpx
      http_method: ANY

  - id: api-httpx-post-json
    patterns:
      - pattern: httpx.post($URL, json=$BODY, ...)
    message: "httpx.post with JSON body"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: httpx
      http_method: POST

  - id: api-httpx-post-data
    patterns:
      - pattern: httpx.post($URL, data=$BODY, ...)
    message: "httpx.post with form data"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: httpx
      http_method: POST

  # =========================================================================
  # AIOHTTP
  # =========================================================================
  - id: api-aiohttp-call
    pattern-either:
      - pattern: $SESSION.get($URL, ...)
      - pattern: $SESSION.post($URL, ...)
      - pattern: $SESSION.put($URL, ...)
      - pattern: $SESSION.patch($URL, ...)
      - pattern: $SESSION.delete($URL, ...)
      - pattern: aiohttp.ClientSession(...)
    message: "Python aiohttp call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: aiohttp
      http_method: ANY

  # =========================================================================
  # URLLIB
  # =========================================================================
  - id: api-urllib-call
    pattern-either:
      - pattern: urllib.request.urlopen($URL, ...)
      - pattern: urllib.request.Request($URL, ...)
      - pattern: urlopen($URL, ...)
    message: "Python urllib call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: urllib
      http_method: ANY

  # =========================================================================
  # HTTP CLIENT
  # =========================================================================
  - id: api-http-client
    pattern-either:
      - pattern: http.client.HTTPConnection(...)
      - pattern: http.client.HTTPSConnection(...)
      - pattern: $CONN.request($METHOD, $URL, ...)
    message: "Python http.client call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: http_client
      http_method: ANY

  # =========================================================================
  # FASTAPI / FLASK ROUTE DEFINITIONS (inbound endpoints)
  # =========================================================================
  - id: api-fastapi-route-get
    pattern: |
      @$APP.get($PATH, ...)
      def $FUNC(...):
          ...
    message: "FastAPI/Flask GET route endpoint detected: $PATH"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: fastapi_route
      http_method: GET

  - id: api-fastapi-route-post
    pattern: |
      @$APP.post($PATH, ...)
      def $FUNC(...):
          ...
    message: "FastAPI/Flask POST route endpoint detected: $PATH"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: fastapi_route
      http_method: POST

  - id: api-fastapi-route-put
    pattern: |
      @$APP.put($PATH, ...)
      def $FUNC(...):
          ...
    message: "FastAPI/Flask PUT route endpoint detected: $PATH"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: fastapi_route
      http_method: PUT

  - id: api-fastapi-route-delete
    pattern: |
      @$APP.delete($PATH, ...)
      def $FUNC(...):
          ...
    message: "FastAPI/Flask DELETE route endpoint detected: $PATH"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: fastapi_route
      http_method: DELETE

  - id: api-fastapi-route-patch
    pattern: |
      @$APP.patch($PATH, ...)
      def $FUNC(...):
          ...
    message: "FastAPI/Flask PATCH route endpoint detected: $PATH"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: fastapi_route
      http_method: PATCH

  - id: api-flask-route
    pattern: |
      @$APP.route($PATH, ...)
      def $FUNC(...):
          ...
    message: "Flask route endpoint detected: $PATH"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: flask_route
      http_method: ANY

  # =========================================================================
  # FASTAPI CLIENT / TESTCLIENT
  # =========================================================================
  - id: api-fastapi-testclient
    pattern-either:
      - pattern: TestClient($APP)
      - pattern: $CLIENT.get($URL, ...)
      - pattern: $CLIENT.post($URL, ...)
      - pattern: $CLIENT.put($URL, ...)
    message: "FastAPI TestClient call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: API_FRAMEWORK
      type: fastapi
      http_method: ANY

  # =========================================================================
  # GRPC
  # =========================================================================
  - id: api-grpc-call
    pattern-either:
      - pattern: grpc.insecure_channel(...)
      - pattern: grpc.secure_channel(...)
    message: "gRPC channel detected"
    languages: [python]
    severity: INFO
    metadata:
      category: GRPC
      type: grpc
      http_method: GRPC

  # =========================================================================
  # WEBSOCKET
  # =========================================================================
  - id: api-websocket-py
    pattern-either:
      - pattern: websocket.create_connection($URL, ...)
      - pattern: websockets.connect($URL, ...)
      - pattern: await websockets.connect($URL, ...)
    message: "Python WebSocket connection detected"
    languages: [python]
    severity: INFO
    metadata:
      category: WEBSOCKET
      type: websocket
      http_method: WS

  # =========================================================================
  # API URL PATTERNS
  # =========================================================================
  - id: api-url-pattern-py
    pattern-regex: "[\"'](https?:\\/\\/[^\"']+\\/api\\/[^\"']*)[\"']"
    message: "API URL pattern detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: url_pattern
      http_method: ANY

  - id: api-env-url-py
    pattern-either:
      - pattern: os.environ.get("API_URL", ...)
      - pattern: os.environ.get("BACKEND_URL", ...)
      - pattern: os.environ["API_URL"]
      - pattern: os.getenv("API_URL", ...)
    message: "API URL from environment variable detected"
    languages: [python]
    severity: INFO
    metadata:
      category: HTTP_CLIENT
      type: env_url
      http_method: ANY

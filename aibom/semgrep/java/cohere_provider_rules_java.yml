rules:
  # Cohere Java SDK

  - id: cohere-client-init-java
    pattern-either:
      - pattern: new CohereClient($...)
      - pattern: CohereClient.builder()
      - pattern: Cohere.builder()
      - pattern: new Cohere($...)
    message: "Cohere client initialization detected"
    languages: [java]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-generate-java
    pattern-either:
      - pattern: $CLIENT.generate($...)
      - pattern: $CLIENT.chat($...)
      - pattern: $CLIENT.embed($...)
      - pattern: $CLIENT.classify($...)
      - pattern: $CLIENT.rerank($...)
    message: "Cohere API call detected"
    languages: [java]
    severity: INFO
    metadata:
      category: cohere
      provider: cohere

  - id: cohere-model-config-java
    languages: [java]
    message: "Cohere model configuration detected"
    severity: WARNING
    metadata:
      category: cohere
      provider: cohere
    pattern-regex: '\.model\s*\(\s*"(command[^"]*)"'

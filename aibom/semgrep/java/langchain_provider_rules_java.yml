rules:
  # LangChain4j: https://github.com/langchain4j/langchain4j
  # The primary Java LangChain implementation

  - id: langchain4j-model-init-java
    pattern-either:
      - pattern: OpenAiChatModel.builder()
      - pattern: OpenAiStreamingChatModel.builder()
      - pattern: OpenAiEmbeddingModel.builder()
      - pattern: OpenAiImageModel.builder()
      - pattern: OpenAiModerationModel.builder()
      - pattern: AnthropicChatModel.builder()
      - pattern: AnthropicStreamingChatModel.builder()
      - pattern: GoogleAiGeminiChatModel.builder()
      - pattern: GoogleAiGeminiStreamingChatModel.builder()
      - pattern: VertexAiGeminiChatModel.builder()
      - pattern: VertexAiGeminiStreamingChatModel.builder()
      - pattern: MistralAiChatModel.builder()
      - pattern: MistralAiStreamingChatModel.builder()
      - pattern: OllamaChatModel.builder()
      - pattern: OllamaStreamingChatModel.builder()
      - pattern: HuggingFaceChatModel.builder()
    message: "LangChain4j AI model initialization detected"
    languages: [java]
    severity: WARNING
    metadata:
      category: langchain
      provider: langchain

  - id: langchain4j-chat-java
    pattern-either:
      - pattern: $MODEL.generate($...)
      - pattern: $MODEL.chat($...)
      - pattern: $CHAIN.execute($...)
      - pattern: $ASSISTANT.chat($...)
    message: "LangChain4j chat/generate call detected"
    languages: [java]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain4j-rag-java
    pattern-either:
      - pattern: EmbeddingStore.builder()
      - pattern: $STORE.add($...)
      - pattern: $STORE.addAll($...)
      - pattern: $STORE.search($...)
      - pattern: $STORE.findRelevant($...)
      - pattern: ContentRetriever.builder()
      - pattern: EmbeddingStoreContentRetriever.builder()
    message: "LangChain4j RAG / embedding store detected"
    languages: [java]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain4j-model-name-java
    languages: [java]
    message: "LangChain4j model name configuration detected"
    severity: WARNING
    metadata:
      category: langchain
      provider: langchain
    pattern-regex: '\.(?:modelName|model)\s*\(\s*(?:OpenAiChatModelName\.(\w+)|"([^"]+)")'

  - id: langchain4j-ai-service-java
    pattern-either:
      - pattern: AiServices.builder($...)
      - pattern: AiServices.create($...)
    message: "LangChain4j AiServices detected"
    languages: [java]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain4j-memory-java
    pattern-either:
      - pattern: MessageWindowChatMemory.builder()
      - pattern: TokenWindowChatMemory.builder()
      - pattern: MessageWindowChatMemory.withMaxMessages($...)
    message: "LangChain4j chat memory detected"
    languages: [java]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

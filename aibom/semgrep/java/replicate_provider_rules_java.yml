rules:
  # Replicate Java (HTTP-based, no official SDK — community wrappers)

  - id: replicate-client-init-java
    pattern-either:
      - pattern: new ReplicateClient($...)
      - pattern: ReplicateClient.builder()
      - pattern: Replicate.builder()
    message: "Replicate client initialization detected"
    languages: [java]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-run-java
    pattern-either:
      - pattern: $CLIENT.run($...)
      - pattern: $CLIENT.createPrediction($...)
      - pattern: $CLIENT.predictions().create($...)
    message: "Replicate prediction call detected"
    languages: [java]
    severity: INFO
    metadata:
      category: replicate
      provider: replicate

  - id: replicate-model-id-java
    languages: [java]
    message: "Replicate model ID detected"
    severity: WARNING
    metadata:
      category: replicate
      provider: replicate
    pattern-regex: '(?:run|createPrediction|version)\s*\(\s*"([a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+(?::[a-f0-9]+)?)"'

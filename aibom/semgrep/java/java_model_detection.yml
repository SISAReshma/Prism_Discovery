rules:
  # ============================================================================
  # JAVA MODEL NAME DETECTION RULES
  # Captures model declarations in Java-specific patterns
  # (builder pattern, setters, annotations, Spring config, etc.)
  # ============================================================================

  # --------------------------------------------------------------------------
  # 1. Variable assignment: String model = "gpt-4";
  # --------------------------------------------------------------------------
  - id: java-model-variable-assign
    languages: [java]
    message: "Model name detected in variable assignment: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: variable_assignment
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: $TYPE $VAR = "$VALUE";
          - pattern: final $TYPE $VAR = "$VALUE";
          - pattern: static final $TYPE $VAR = "$VALUE";
          - pattern: static $TYPE $VAR = "$VALUE";
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)^(model|models|modelName|modelID|modelId|model_name|model_id|engine|deployment|deploymentName|defaultModel|DEFAULT_MODEL|MODEL_NAME|MODEL_ID|LLM_MODEL)$'
    tags: [java, model, variable]

  # --------------------------------------------------------------------------
  # 2. Constant / static final: public static final String MODEL = "gpt-4";
  # --------------------------------------------------------------------------
  - id: java-model-constant
    languages: [java]
    message: "Model name detected in constant: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: constant
      confidence: "0.95"
    pattern-regex: '(?:public|private|protected)?\s*static\s+final\s+String\s+(?i)(MODEL|MODEL_NAME|MODEL_ID|DEFAULT_MODEL|ENGINE|DEPLOYMENT|LLM_MODEL)\s*=\s*"([^"]+)"'
    tags: [java, model, constant]

  # --------------------------------------------------------------------------
  # 3. Builder pattern: .model("gpt-4") / .setModel("gpt-4")
  #    This is THE most common Java AI SDK pattern
  # --------------------------------------------------------------------------
  - id: java-model-builder-method
    languages: [java]
    message: "Model name detected in builder/setter call"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: builder
      confidence: "0.98"
    pattern-regex: '\.(?:model|setModel|modelName|setModelName|modelId|setModelId|engine|setEngine|deployment|setDeployment|withModel|withModelName)\s*\(\s*"([^"]+)"'
    tags: [java, model, builder]

  # --------------------------------------------------------------------------
  # 4. Method argument with known model name
  # --------------------------------------------------------------------------
  - id: java-model-method-arg
    languages: [java]
    message: "Model name detected in method argument"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: method_arg
      confidence: "0.90"
    pattern-regex: '\w+\.\w+\(\s*"(gpt-4o-mini|gpt-4o|gpt-4-turbo|gpt-4|gpt-3\.5-turbo|o1-preview|o1-mini|o3-mini|o1|o3|claude-3[^"]*|claude-2[^"]*|gemini[^"]*|llama[^"]*|mistral[^"]*|phi-[^"]*|qwen[^"]*|deepseek[^"]*|text-embedding[^"]*|whisper[^"]*|dall-e[^"]*|command[^"]*)[^"]*"'
    tags: [java, model, method]

  # --------------------------------------------------------------------------
  # 5. Map / HashMap literal: map.put("model", "gpt-4");
  # --------------------------------------------------------------------------
  - id: java-model-map-put
    languages: [java]
    message: "Model name detected in Map.put: $VALUE"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: map_put
      confidence: "0.90"
    patterns:
      - pattern-either:
          - pattern: $MAP.put("model", "$VALUE");
          - pattern: $MAP.put("model_name", "$VALUE");
          - pattern: $MAP.put("model_id", "$VALUE");
          - pattern: $MAP.put("engine", "$VALUE");
          - pattern: $MAP.put("modelName", "$VALUE");
          - pattern: $MAP.put("modelId", "$VALUE");
    tags: [java, model, map]

  # --------------------------------------------------------------------------
  # 6. Annotation value: @Value("${model.name}") or @Value("gpt-4")
  # --------------------------------------------------------------------------
  - id: java-model-annotation-value
    languages: [java]
    message: "Model configuration via annotation detected"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: annotation
      confidence: "0.85"
    pattern-regex: '@Value\s*\(\s*"\$\{(?i)[^}]*(model|engine|deployment)[^}]*\}"\s*\)'
    tags: [java, model, annotation]

  # --------------------------------------------------------------------------
  # 7. Environment variable: System.getenv("MODEL_NAME") / System.getProperty
  # --------------------------------------------------------------------------
  - id: java-model-env-var
    languages: [java]
    message: "Model name environment variable detected: $VAR"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: env_var
      confidence: "0.85"
    patterns:
      - pattern-either:
          - pattern: System.getenv("$VAR")
          - pattern: System.getProperty("$VAR")
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i).*(MODEL|ENGINE|DEPLOYMENT).*'
    tags: [java, model, env]

  # --------------------------------------------------------------------------
  # 8. Constructor with model argument: new ChatModel("gpt-4", ...)
  # --------------------------------------------------------------------------
  - id: java-model-constructor
    languages: [java]
    message: "Known AI model name detected in constructor"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: constructor
      confidence: "0.97"
    pattern-regex: 'new\s+\w+\s*\(\s*"(gpt-4o-mini|gpt-4o|gpt-4-turbo|gpt-4|gpt-3\.5-turbo|o1-preview|o1-mini|o3-mini|o1|o3|dall-e-3|dall-e-2|text-embedding-3-large|text-embedding-3-small|text-embedding-ada-002|whisper-1|tts-1-hd|tts-1|claude-3-5-sonnet|claude-3-opus|claude-3-sonnet|claude-3-haiku|claude-2|gemini-1\.5-pro|gemini-1\.5-flash|gemini-pro|llama-3|mistral-large|mistral-medium|command-r-plus|command-r)[^"]*"'
    tags: [java, model, constructor]

  # --------------------------------------------------------------------------
  # 9. Enum-style model reference: OpenAiChatModelName.GPT_4_O
  #    Common in langchain4j and similar Java AI libraries
  # --------------------------------------------------------------------------
  - id: java-model-enum-reference
    languages: [java]
    message: "AI model enum reference detected"
    severity: WARNING
    metadata:
      category: model_detection
      pattern_type: enum_reference
      confidence: "0.95"
    pattern-regex: '(?:OpenAi(?:Chat)?ModelName|ChatModelName|EmbeddingModelName|ModelName|AiModels?)\.\s*(GPT[_A-Z0-9]*|CLAUDE[_A-Z0-9]*|GEMINI[_A-Z0-9]*|LLAMA[_A-Z0-9]*|MISTRAL[_A-Z0-9]*|COMMAND[_A-Z0-9]*|TEXT_EMBEDDING[_A-Z0-9]*|WHISPER[_A-Z0-9]*)'
    tags: [java, model, enum]

  # --------------------------------------------------------------------------
  # 10. Properties / YAML config: model: gpt-4 or model.name=gpt-4
  # --------------------------------------------------------------------------
  - id: java-model-properties-config
    languages: [java]
    message: "Model name in properties/YAML config"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: properties
      confidence: "0.85"
    pattern-regex: '(?i)(?:model|engine|deployment)(?:[-_.]?name|[-_.]?id)?\s*[=:]\s*"([^"]+)"'
    tags: [java, model, config]

  # --------------------------------------------------------------------------
  # 11. Generic catch-all: Regex for model-like assignments
  # --------------------------------------------------------------------------
  - id: java-model-regex-catch-all
    languages: [java]
    message: "Potential model name detected in assignment"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: regex_catchall
      confidence: "0.70"
    pattern-regex: '(?i)(?:model|engine|deployment)(?:Name|ID|_name|_id)?\s*=\s*"([^"]+)"'
    tags: [java, model, regex]

  # --------------------------------------------------------------------------
  # 12. Known AI model literal string (language-agnostic fallback)
  # --------------------------------------------------------------------------
  - id: java-model-known-literal
    languages: [java]
    message: "Known AI model string literal detected"
    severity: INFO
    metadata:
      category: model_detection
      pattern_type: literal_regex
      confidence: "0.85"
    pattern-regex: '"(gpt-4o-mini|gpt-4o|gpt-4-turbo|gpt-4|gpt-3\.5-turbo|o1-preview|o1-mini|o3-mini|o1|o3|dall-e-3|dall-e-2|text-embedding-3-large|text-embedding-3-small|text-embedding-ada-002|whisper-1|tts-1-hd|tts-1|claude-3-5-sonnet|claude-3-opus|claude-3-sonnet|claude-3-haiku|claude-2|gemini-1\.5-pro|gemini-1\.5-flash|gemini-pro|llama-3|mistral-large|mistral-medium|command-r-plus|command-r)"'
    tags: [java, model, literal]

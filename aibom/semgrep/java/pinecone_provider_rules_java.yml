rules:
  # Pinecone Java SDK: https://github.com/pinecone-io/pinecone-java-client

  - id: pinecone-client-init-java
    pattern-either:
      - pattern: new Pinecone($...)
      - pattern: Pinecone.builder()
      - pattern: new PineconeClient($...)
      - pattern: PineconeClientConfig.builder()
    message: "Pinecone client initialization detected"
    languages: [java]
    severity: INFO
    metadata:
      category: pinecone
      provider: pinecone

  - id: pinecone-index-java
    pattern-either:
      - pattern: $CLIENT.getIndexConnection($...)
      - pattern: $CLIENT.createIndex($...)
      - pattern: $CLIENT.describeIndex($...)
      - pattern: $CLIENT.listIndexes()
      - pattern: $INDEX.upsert($...)
      - pattern: $INDEX.query($...)
      - pattern: $INDEX.deleteAll($...)
      - pattern: $INDEX.fetch($...)
    message: "Pinecone index operation detected"
    languages: [java]
    severity: INFO
    metadata:
      category: pinecone
      provider: pinecone

rules:
  - id: langchain-chat-model-js
    pattern-either:
      - pattern: new ChatOpenAI($...)
      - pattern: new ChatAnthropic($...)
      - pattern: new ChatGoogleGenerativeAI($...)
      - pattern: ChatOpenAI.create($...)
      - pattern: ChatAnthropic.create($...)
    message: "LangChain chat model instantiation detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-llm-model-js
    pattern-either:
      - pattern: new OpenAI($...)
      - pattern: new HuggingFaceInference($...)
      - pattern: new Replicate($...)
      - pattern: new Cohere($...)
    message: "LangChain LLM model instantiation detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-embeddings-js
    pattern-either:
      - pattern: new OpenAIEmbeddings($...)
      - pattern: new HuggingFaceInferenceEmbeddings($...)
      - pattern: new CohereEmbeddings($...)
    message: "LangChain embeddings model detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-chain-js
    pattern-either:
      - pattern: new LLMChain($...)
      - pattern: new ConversationChain($...)
      - pattern: new RetrievalQAChain($...)
      - pattern: new ConversationalRetrievalQAChain($...)
    message: "LangChain chain usage detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-agent-js
    pattern-either:
      - pattern: initializeAgentExecutor($...)
      - pattern: initializeAgentExecutorWithOptions($...)
      - pattern: AgentExecutor.fromAgentAndTools($...)
    message: "LangChain agent usage detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

  - id: langchain-vectorstore-js
    pattern-either:
      - pattern: new MemoryVectorStore($...)
      - pattern: new PineconeStore($...)
      - pattern: new Chroma($...)
      - pattern: FaissStore.fromDocuments($...)
    message: "LangChain vectorstore usage detected"
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      category: langchain
      provider: langchain

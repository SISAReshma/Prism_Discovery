rules:
  # =========================================================================
  # REQUESTS LIBRARY
  # =========================================================================
  - id: api-requests-call
    pattern-either:
      - pattern: requests.get($URL, $...)
      - pattern: requests.post($URL, $...)
      - pattern: requests.put($URL, $...)
      - pattern: requests.patch($URL, $...)
      - pattern: requests.delete($URL, $...)
      - pattern: requests.head($URL, $...)
      - pattern: requests.options($URL, $...)
      - pattern: requests.request($METHOD, $URL, $...)
    message: "Python requests library call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: requests

  - id: api-requests-session
    pattern-either:
      - pattern: $SESSION.get($URL, $...)
      - pattern: $SESSION.post($URL, $...)
      - pattern: $SESSION.put($URL, $...)
      - pattern: $SESSION.patch($URL, $...)
      - pattern: $SESSION.delete($URL, $...)
    message: "Python requests session call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: requests

  # =========================================================================
  # HTTPX
  # =========================================================================
  - id: api-httpx-call
    pattern-either:
      - pattern: httpx.get($URL, $...)
      - pattern: httpx.post($URL, $...)
      - pattern: httpx.put($URL, $...)
      - pattern: httpx.patch($URL, $...)
      - pattern: httpx.delete($URL, $...)
      - pattern: httpx.request($METHOD, $URL, $...)
    message: "Python httpx library call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: httpx

  - id: api-httpx-async
    pattern-either:
      - pattern: await $CLIENT.get($URL, $...)
      - pattern: await $CLIENT.post($URL, $...)
      - pattern: await $CLIENT.put($URL, $...)
      - pattern: await $CLIENT.patch($URL, $...)
      - pattern: await $CLIENT.delete($URL, $...)
    message: "Python httpx async call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: httpx

  # =========================================================================
  # AIOHTTP
  # =========================================================================
  - id: api-aiohttp-call
    pattern-either:
      - pattern: $SESSION.get($URL, $...)
      - pattern: $SESSION.post($URL, $...)
      - pattern: $SESSION.put($URL, $...)
      - pattern: $SESSION.patch($URL, $...)
      - pattern: $SESSION.delete($URL, $...)
      - pattern: aiohttp.ClientSession($...)
    message: "Python aiohttp call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: aiohttp

  # =========================================================================
  # URLLIB
  # =========================================================================
  - id: api-urllib-call
    pattern-either:
      - pattern: urllib.request.urlopen($URL, $...)
      - pattern: urllib.request.Request($URL, $...)
      - pattern: urlopen($URL, $...)
    message: "Python urllib call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: urllib

  # =========================================================================
  # HTTP CLIENT
  # =========================================================================
  - id: api-http-client
    pattern-either:
      - pattern: http.client.HTTPConnection($...)
      - pattern: http.client.HTTPSConnection($...)
      - pattern: $CONN.request($METHOD, $URL, $...)
    message: "Python http.client call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: http_client

  # =========================================================================
  # FASTAPI CLIENT / TESTCLIENT
  # =========================================================================
  - id: api-fastapi-testclient
    pattern-either:
      - pattern: TestClient($APP)
      - pattern: $CLIENT.get($URL, $...)
      - pattern: $CLIENT.post($URL, $...)
      - pattern: $CLIENT.put($URL, $...)
    message: "FastAPI TestClient call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: fastapi

  # =========================================================================
  # GRPC
  # =========================================================================
  - id: api-grpc-call
    pattern-either:
      - pattern: grpc.insecure_channel($...)
      - pattern: grpc.secure_channel($...)
      - pattern: $STUB.$METHOD($...)
    message: "gRPC call detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: grpc

  # =========================================================================
  # WEBSOCKET
  # =========================================================================
  - id: api-websocket-py
    pattern-either:
      - pattern: websocket.create_connection($URL, $...)
      - pattern: websockets.connect($URL, $...)
      - pattern: await websockets.connect($URL, $...)
    message: "Python WebSocket connection detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: websocket

  # =========================================================================
  # API URL PATTERNS
  # =========================================================================
  - id: api-url-pattern-py
    pattern-regex: '["''](https?:\/\/[^"'']+\/api\/[^"'']*)["\']'
    message: "API URL pattern detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: url_pattern

  - id: api-env-url-py
    pattern-either:
      - pattern: os.environ.get("API_URL", $...)
      - pattern: os.environ.get("BACKEND_URL", $...)
      - pattern: os.environ["API_URL"]
      - pattern: os.getenv("API_URL", $...)
    message: "API URL from environment variable detected"
    languages: [python]
    severity: INFO
    metadata:
      category: api_calls
      type: env_url

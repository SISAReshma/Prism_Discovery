rules:
  - id: google-genai-client
    pattern-either:
      - pattern: genai.configure($...)
      - pattern: google.generativeai.configure($...)
      - pattern: genai.GenerativeModel($...)
      - pattern: google.generativeai.GenerativeModel($...)
    message: "Google Generative AI client detected"
    languages: [python]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-genai-generate
    pattern-either:
      - pattern: $MODEL.generate_content($...)
      - pattern: $MODEL.generate_content_async($...)
      - pattern: $MODEL.start_chat($...)
    message: "Google Generative AI content generation detected"
    languages: [python]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-vertex-ai
    pattern-either:
      - pattern: vertexai.init($...)
      - pattern: TextGenerationModel.from_pretrained($...)
      - pattern: ChatModel.from_pretrained($...)
      - pattern: CodeGenerationModel.from_pretrained($...)
      - pattern: ImageGenerationModel.from_pretrained($...)
    message: "Google Vertex AI usage detected"
    languages: [python]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-palm
    pattern-either:
      - pattern: palm.configure($...)
      - pattern: palm.generate_text($...)
      - pattern: palm.chat($...)
    message: "Google PaLM API usage detected"
    languages: [python]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-model-config
    patterns:
      - pattern: |
          $FUNC(..., model_name=$MODEL, ...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: "\"(gemini|palm|text-bison|chat-bison|code-bison|codechat-bison|imagegeneration).*\""
    message: "Google AI model configuration detected"
    languages: [python]
    severity: INFO
    metadata:
      category: google
      provider: google

  - id: google-gemini-model
    patterns:
      - pattern: GenerativeModel($MODEL, ...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: "\"gemini.*\""
    message: "Google Gemini model instantiation detected"
    languages: [python]
    severity: INFO
    metadata:
      category: google
      provider: google
